[package]
name = "zeroclaw-tls"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Shared TLS / mTLS construction (server config, client verifier, certificate pinning, PEM loading) for ZeroClaw."
publish = false

[dependencies]
anyhow = "1.0"
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "std", "tls12"] }
tokio-rustls = { version = "0.26.4", default-features = false, features = ["logging", "tls12", "ring"] }
rustls-pemfile = "2"
sha2 = "0.10"
hex = "0.4"
serde_json = "1.0"
# Certificate generation for the secure-by-default auto-gen + issuance paths.
# Pinned to the `ring` backend to match the project's rustls provider.
rcgen = { version = "0.13", default-features = false, features = ["ring", "pem", "x509-parser"] }
# Read the subject CN from an outer client certificate for the optional
# outer-mTLS relay variant (node-id-from-cert routing).
x509-parser = "0.17"
time = { version = "0.3", default-features = false, features = ["std"] }
# CA private-key at-rest encryption (threat A4): scrypt KDF + XChaCha20-Poly1305
# AEAD over the PKCS#8 PEM, key material zeroized on drop. All already vetted
# in-tree dependencies (no new supply-chain surface).
scrypt = { version = "0.11", default-features = false, features = ["std"] }
chacha20poly1305 = { version = "0.10", default-features = false, features = ["alloc", "getrandom"] }
zeroize = { version = "1.8", features = ["alloc"] }
getrandom = "0.2"
zeroclaw-log.workspace = true

[features]
# Shared certificate/CSR generation helpers for downstream test code (the daemon
# enrollment + relay integration tests) so test fixtures are not duplicated.
testing = []

[dev-dependencies]
tempfile = "3.26"
