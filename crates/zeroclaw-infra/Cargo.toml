[package]
name = "zeroclaw-infra"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Channel infrastructure: session backends, debouncing, stall watchdog."
publish = false

[features]
## PostgreSQL session backend (adds `postgres`, `r2d2`, `r2d2_postgres`).
backend-postgres = ["dep:native-tls", "dep:postgres", "dep:postgres-native-tls", "dep:r2d2", "dep:r2d2_postgres"]
## Oracle 23ai session backend (adds `oracle`, `r2d2`).
## Requires Oracle Instant Client at runtime; set LD_LIBRARY_PATH accordingly.
backend-oracle = ["dep:oracle", "dep:r2d2"]
## IBM Db2 12.1.5 session backend in Oracle compatibility mode (adds `odbc-api`, `r2d2`).
## Requires IBM Db2 CLI / ODBC driver at runtime; set LD_LIBRARY_PATH to the Db2 lib64 dir.
backend-db2 = ["dep:odbc-api", "dep:r2d2"]
## MySQL 9.0+ session backend (adds `mysql`). MySQL's crate ships its own pool.
## MySQL 9.0 is required for native VECTOR column type used by co-located fleet services.
backend-mysql = ["dep:mysql"]

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
zeroclaw-spawn.workspace = true
zeroclaw-config = { workspace = true, features = ["schema-export"] }
anyhow = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
parking_lot = "0.12"
portable-atomic = "1"
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
thiserror = "2"
tokio = { version = "1.50", default-features = false, features = ["sync", "time"] }

# Optional: PostgreSQL backend
native-tls    = { version = "0.2", optional = true }
postgres      = { version = "0.19", optional = true, features = ["with-chrono-0_4"] }
postgres-native-tls = { version = "0.5", optional = true }
r2d2          = { version = "0.8",  optional = true }
r2d2_postgres = { version = "0.18", optional = true }

# Optional: Oracle 23ai backend
oracle = { version = "0.5", optional = true, features = ["chrono"] }

# Optional: IBM Db2 backend (ODBC)
odbc-api = { version = "2", optional = true }

# Optional: MySQL 9.0+ backend (native protocol, built-in pool)
mysql = { version = "25", optional = true, features = ["chrono"] }

[dev-dependencies]
tempfile = "3.26"
tokio = { version = "1.50", features = ["rt-multi-thread", "macros"] }
