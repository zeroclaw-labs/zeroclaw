[package]
name = "zeroclaw-infra"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Channel infrastructure: session backends, debouncing, stall watchdog."
publish = false

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
zeroclaw-spawn.workspace = true
anyhow = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
parking_lot = "0.12"
portable-atomic = "1"
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
tokio = { version = "1.50", default-features = false, features = ["sync", "time"] }

[features]
# PostgreSQL session backend
backend-postgres = ["dep:postgres", "dep:r2d2", "dep:r2d2_postgres", "dep:tokio-postgres", "dep:tokio-postgres-rustls", "dep:rustls", "dep:webpki-root-certs", "dep:url"]

[dependencies.postgres]
version = "0.19"
default-features = false
features = ["with-chrono-0_4"]
optional = true

[dependencies.tokio-postgres]
version = "0.7"
default-features = false
features = ["with-chrono-0_4"]
optional = true

[dependencies.r2d2]
version = "0.8"
optional = true

[dependencies.r2d2_postgres]
version = "0.18"
optional = true

[dependencies.rustls]
version = "0.23"
default-features = false
features = ["ring"]
optional = true

[dependencies.tokio-postgres-rustls]
version = "0.13"
optional = true

[dependencies.webpki-root-certs]
version = "0.26"
optional = true

[dependencies.url]
version = "2.5"
optional = true

[dev-dependencies]
tempfile = "3.26"
tokio = { version = "1.50", features = ["rt-multi-thread", "macros"] }
