[package]
name = "zeroclaw-onboarding"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Chat onboarding flow for ZeroClaw"
publish = false

[dependencies]
zeroclaw-config.workspace = true
zeroclaw-runtime.workspace = true
async-trait = "0.1"
thiserror = "2.0"
dialoguer = { version = "0.12", features = ["fuzzy-select"] }
tokio = { version = "1.50", features = ["rt"] }
fluent = "0.16"
zeroclaw-log.workspace = true
serde_json = "1.0"

[dev-dependencies]
tokio = { version = "1.50", features = ["rt", "macros", "sync"] }
tempfile = "3.26"
portable-pty = "0.8"
escargot = "0.5"
