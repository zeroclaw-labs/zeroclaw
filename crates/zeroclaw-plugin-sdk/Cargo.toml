[package]
name = "zeroclaw-plugin-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Guest-side SDK for authoring ZeroClaw WASI Preview 2 / Component Model plugins."
publish = false

[features]
default = ["plugins-wit-v0"]
plugins-wit-v0 = []
tool = []
memory = []
channel = []

[dependencies]
wit-bindgen = { version = "0.58.0", default-features = false, features = ["macros", "realloc"] }

[dev-dependencies]
zeroclaw-plugins = { workspace = true, features = ["plugins-wasm-cranelift"] }
zeroclaw-api.workspace = true
serde_json = { version = "1.0", default-features = false, features = ["std"] }
tempfile = "3.26"
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }

# Each world's round-trip test is its own [[test]] target gated by
# required-features: a single plugin component implements exactly one
# world, and wit_bindgen::generate! cannot have two worlds that share an
# identical exported interface (e.g. plugin-info) compiled into the same
# crate at once — the generated #[macro_export] cabi shims collide
# regardless of module nesting. `cargo test --features tool` (etc.) builds
# and runs only the matching target; the others are silently skipped.
[[test]]
name = "spike_tool"
required-features = ["tool"]

[[test]]
name = "spike_memory"
required-features = ["memory"]
