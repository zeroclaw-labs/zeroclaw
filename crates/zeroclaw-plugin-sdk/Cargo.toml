[package]
name = "zeroclaw-plugin-sdk"
version = "0.1.0"
edition = "2021"
description = "Ergonomic SDK for building ZeroClaw WASM plugins"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["rlib"]

[dependencies]
extism-pdk = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
