# ZeroClaw V1 canonical fixture
# Top-level provider fields, channels_config with old scalar field names.
# Run through the migration chain to derive V2 and V3 fixtures.

api_key = "sk-example"
default_provider = "myprovider"
default_model = "my-model"
default_temperature = 0.7

[model_providers.myprovider]
api_key = "sk-example"
base_url = "https://api.myprovider.example.com/v1"
api_path = "/chat/completions"
model = "my-model"
temperature = 0.7
timeout_secs = 120
max_tokens = 4096
merge_system_into_user = false
wire_api = "openai"

[model_providers.myprovider.extra_headers]
X-Custom-Header = "my-value"

[model_providers.myprovider-alt]
api_key = "sk-alt-example"
base_url = "https://api.myprovider-alt.example.com/v1"
model = "my-alt-model"
temperature = 0.5

# ── Agent ─────────────────────────────────────────────────────────────────────

[agent]
compact_context = true
context_aware_tools = true
keep_tool_context_turns = 3
max_context_tokens = 100000
max_history_messages = 50
max_system_prompt_chars = 8000
max_tool_iterations = 10
max_tool_result_chars = 20000
parallel_tools = true
tool_dispatcher = "auto"

# ── Memory ────────────────────────────────────────────────────────────────────

[memory]
archive_after_days = 90
auto_hydrate = true
auto_save = true
backend = "sqlite"
chunk_max_tokens = 512
conversation_retention_days = 30
embedding_model = "text-embedding-3-small"
embedding_provider = "openai"
hygiene_enabled = true
keyword_weight = 0.3
min_relevance_score = 0.5
purge_after_days = 365
rerank_enabled = false
search_mode = "hybrid"
vector_weight = 0.7

# ── Autonomy ──────────────────────────────────────────────────────────────────

[autonomy]
allowed_commands = ["git", "cargo", "grep", "rg", "jq"]
always_ask = []
auto_approve = ["read_file", "list_directory"]
block_high_risk_commands = true
forbidden_paths = ["/etc", "/sys", "/root"]
level = "supervised"
max_actions_per_hour = 100
max_cost_per_day_cents = 500
non_cli_excluded_tools = []
require_approval_for_medium_risk = true
shell_env_passthrough = ["HOME", "PATH", "LANG", "TERM"]
workspace_only = true

# ── Security ──────────────────────────────────────────────────────────────────

[security.sandbox]
enabled = false
backend = "none"

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 16
memory_monitoring = true

[security.audit]
enabled = false
retention_days = 90

[security.otp]
enabled = false

# ── Observability ─────────────────────────────────────────────────────────────

[observability]
backend = "stdout"
runtime_trace_mode = "off"
runtime_trace_max_entries = 1000

# ── Gateway ───────────────────────────────────────────────────────────────────

[gateway]
allow_public_bind = false
host = "127.0.0.1"
idempotency_max_keys = 10000
idempotency_ttl_secs = 300
pair_rate_limit_per_minute = 5
port = 3000
require_pairing = true
session_persistence = true
session_ttl_hours = 24
trust_forwarded_headers = false
webhook_rate_limit_per_minute = 60

# ── Cost ──────────────────────────────────────────────────────────────────────

[cost]
allow_override = false
daily_limit_usd = 10.0
enabled = true
monthly_limit_usd = 200.0
warn_at_percent = 80

# ── Backup ────────────────────────────────────────────────────────────────────

[backup]
compress = true
destination_dir = "~/.zeroclaw/backups"
enabled = false
encrypt = false
max_keep = 5

# ── Scheduler ─────────────────────────────────────────────────────────────────

[scheduler]
enabled = true
max_concurrent = 4
max_tasks = 100

# ── Heartbeat ─────────────────────────────────────────────────────────────────

[heartbeat]
adaptive = false
enabled = false
interval_minutes = 60
load_session_context = false
max_run_history = 10
task_timeout_secs = 120
two_phase = false

# ── Cron ──────────────────────────────────────────────────────────────────────

[cron]
catch_up_on_startup = false
enabled = true
max_run_history = 20

# ── Proxy ─────────────────────────────────────────────────────────────────────

[proxy]
enabled = false
no_proxy = ["localhost", "127.0.0.1"]
scope = "zeroclaw"

# ── Reliability ───────────────────────────────────────────────────────────────

[reliability]
channel_initial_backoff_secs = 5
channel_max_backoff_secs = 300
provider_backoff_ms = 500
provider_retries = 3
scheduler_poll_secs = 10
scheduler_retries = 2

# ── Pacing ────────────────────────────────────────────────────────────────────

[pacing]
loop_detection_enabled = true
loop_detection_max_repeats = 3
loop_detection_window_size = 5

# ── Skills ────────────────────────────────────────────────────────────────────

[skills]
allow_scripts = false
open_skills_enabled = false
prompt_injection_mode = "full"

# ── Browser ───────────────────────────────────────────────────────────────────

[browser]
backend = "native"
enabled = false
native_headless = true
native_webdriver_url = "http://localhost:4444"

# ── Web search / fetch / http ─────────────────────────────────────────────────

[web_search]
enabled = true
max_results = 10
provider = "brave"
timeout_secs = 30

[web_fetch]
enabled = true
max_response_size = 1048576
timeout_secs = 30

[http_request]
allow_private_hosts = false
enabled = false
max_response_size = 1048576
timeout_secs = 30

# ── Delegate ──────────────────────────────────────────────────────────────────

[delegate]
agentic_timeout_secs = 300
timeout_secs = 60

# ── Data retention ────────────────────────────────────────────────────────────

[data_retention]
dry_run = false
enabled = false
retention_days = 90

