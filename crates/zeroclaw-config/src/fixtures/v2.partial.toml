# V2 partial fixture — fields with no V1 migration path.
# Deep-merged on top of the V1-derived V2 config.

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = ["git", "cargo", "grep"]
forbidden_paths = ["/etc", "/sys"]
max_actions_per_hour = 100
max_cost_per_day_cents = 500
require_approval_for_medium_risk = true

[gateway]
enabled = true
port = 3000
host = "127.0.0.1"
auth_token = "gateway-token-example"

[cost]
budget_cents_per_day = 1000
alert_threshold_pct = 80

[channels_config.discord]
enabled = true

[channels_config.matrix]
enabled = true

[channels_config.mattermost]
enabled = true

[channels_config.reddit]
enabled = true

[channels_config.signal]
enabled = true

[channels_config.slack]
enabled = true

[channels_config.telegram]
enabled = true
