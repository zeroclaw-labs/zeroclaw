[package]
name = "zeroclaw-tools"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tool implementations for agent-callable capabilities."
publish = false

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
zeroclaw-spawn.workspace = true
zeroclaw-config = { workspace = true, default-features = false }
zeroclaw-providers.workspace = true
zeroclaw-memory.workspace = true
zeroclaw-infra.workspace = true
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
directories = "6.0"
futures-util = { version = "0.3", default-features = false }
fluent = "0.16"
glob = "0.3"
hex = "0.4"
infer = { version = "0.19", default-features = false }
fantoccini = { version = "0.22.1", optional = true, default-features = false, features = ["rustls-tls"] }
nanohtml2text = "0.2"
parking_lot = "0.12"
probe-rs = { version = "0.31", optional = true }
regex = "1.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-webpki-roots-no-provider", "__rustls-ring", "multipart", "stream"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
sha2 = "0.10"
sys-locale.workspace = true
tempfile = "3.26"
thiserror = "2.0"
tokio = { version = "1.50", default-features = false, features = ["rt-multi-thread", "macros", "time", "net", "io-util", "sync", "process", "fs"] }
tokio-stream = { version = "0.1.18", default-features = false, features = ["fs", "sync"] }
tokio-tungstenite = { version = "0.29", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
tokio-util = { version = "0.7", default-features = false }
toml = "1.0"
urlencoding = "2.1"
uuid = { version = "1.22", default-features = false, features = ["v4", "serde", "std"] }
which = "8.0"
async-imap = { version = "0.11", features = ["runtime-tokio"], default-features = false }
mail-parser = "0.11"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pki-types = "1.14.0"
tokio-rustls = { version = "0.26.4", default-features = false, features = ["ring", "tls12"] }
webpki-roots = "1.0.6"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = { version = "0.10", optional = true }
core-graphics = { version = "0.25", features = ["elcapitan", "highsierra"], optional = true }
objc2-core-graphics = { version = "0.3", default-features = false, features = ["CGEvent", "CGWindow"], optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
atspi = { version = "0.30", default-features = false, features = ["connection", "proxies", "tokio", "zbus"], optional = true }
png = { version = "0.18", optional = true }
x11rb = { version = "0.13.2", default-features = false, features = ["res", "xtest"], optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
enigo = { version = "0.6.1", default-features = false, optional = true }
same-file = "1.0"
sysinfo = { version = "0.36", default-features = false, features = ["system"], optional = true }
# `input` is required because uiautomation 0.25 imports its input module from
# core even with default features disabled; `control` supplies safe foreground
# window activation without local Win32 `unsafe`.
uiautomation = { version = "0.25", default-features = false, features = ["control", "input", "pattern", "screenshot"], optional = true }

[features]
default = []
browser-native = ["dep:fantoccini"]
computer-use = [
    "dep:atspi",
    "dep:core-foundation",
    "dep:core-graphics",
    "dep:enigo",
    "dep:objc2-core-graphics",
    "dep:png",
    "dep:sysinfo",
    "dep:uiautomation",
    "dep:x11rb",
]
probe = ["dep:probe-rs"]

[dev-dependencies]
zeroclaw-infra.workspace = true
tempfile = "3.26"
tokio = { version = "1.50", features = ["rt-multi-thread", "macros"] }
wiremock = "0.6"
scopeguard = "1.2"
tokio-test = "0.4"
