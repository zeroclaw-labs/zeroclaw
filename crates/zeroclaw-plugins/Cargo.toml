[package]
name = "zeroclaw-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WASM plugin system for ZeroClaw — host, manifests, signatures, execution bridge."
publish = false

[features]
plugins-wit-v0 = []

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
ring = "0.17"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
extism = "1.21"
reqwest = { version = "0.12", default-features = false, features = [
  "blocking",
  "rustls-tls",
] }
thiserror = "2.0"
tokio = { version = "1.50", default-features = false, features = [
  "macros",
  "rt",
  "sync",
] }
toml = "1.0"

[dev-dependencies]
tempfile = "3.26"
