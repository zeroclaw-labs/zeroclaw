[package]
name = "zeroclaw-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WASM plugin system for ZeroClaw — host, manifests, signatures, execution bridge."
publish = false

[features]
default = ["plugins-wit-v0"]
plugins-wit-v0 = []
plugins-wasmtime = [
  "dep:futures-util",
  "dep:rustls",
  "dep:rustls-pemfile",
  "dep:tokio-rustls",
  "dep:tokio-tungstenite",
  "dep:wasmtime",
  "dep:wasmtime-wasi",
  "dep:wasmtime-wasi-http",
  "dep:webpki-roots",
  "dep:zeroclaw-spawn",
  "tokio/io-util",
]
plugins-wasm-cranelift = ["plugins-wasmtime", "wasmtime/cranelift"]
plugins-wasm-pulley = ["plugins-wasmtime", "wasmtime/pulley"]

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
zeroclaw-infra.workspace = true
zeroclaw-spawn = { workspace = true, optional = true }
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
futures-util = { version = "0.3", default-features = false, features = [
  "sink",
], optional = true }
jsonschema = { version = "0.48", default-features = false }
ring = "0.17"
same-file = "1.0"
rustls = { version = "0.23", default-features = false, optional = true, features = [
  "logging",
  "ring",
  "std",
  "tls12",
] }
rustls-pemfile = { version = "2", optional = true }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
thiserror = "2.0"
tokio = { version = "1.50", default-features = false, features = ["sync", "macros", "net", "rt", "time"] }
tokio-tungstenite = { version = "0.29", default-features = false, features = [
  "rustls-tls-webpki-roots",
], optional = true }
toml = "1.0"
toml_edit = "0.25"
wasmtime = { version = "45.0.3", default-features = false, features = [
  "component-model",
  "runtime",
  "std",
  "async",
], optional = true }
wasmtime-wasi = { version = "45.0.3", default-features = false, features = [
  "p2",
], optional = true }
wasmtime-wasi-http = { version = "45.0.3", default-features = false, features = [
  "p2",
  "default-send-request",
], optional = true }
zeroize.workspace = true
tokio-rustls = { version = "0.26.4", default-features = false, features = [
  "logging",
  "tls12",
  "ring",
], optional = true }
webpki-roots = { version = "1.0.6", optional = true }

[dev-dependencies]
rcgen = "0.13"
tempfile = "3.26"
zeroclaw-config = { path = "../zeroclaw-config" }
