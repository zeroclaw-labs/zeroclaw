[package]
name = "zeroclaw-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WASM plugin system for ZeroClaw — host, manifests, signatures, execution bridge."
publish = false

[features]
default = ["plugins-wit-v0"]
plugins-wit-v0 = []
plugins-wasmtime = [
  "dep:dns-lookup",
  "dep:hyper",
  "dep:http",
  "dep:http-body-util",
  "dep:bytes",
  "dep:futures-util",
  "dep:tokio-tungstenite",
  "dep:wasmtime",
  "dep:wasmtime-wasi",
  "dep:wasmtime-wasi-http",
  "dep:zeroclaw-config",
  "dep:zeroclaw-infra",
  "tokio/fs",
  "tokio/net",
  "tokio/io-util",
]
plugins-wasm-cranelift = ["plugins-wasmtime", "wasmtime/cranelift"]
plugins-wasm-pulley = ["plugins-wasmtime", "wasmtime/pulley"]

[dependencies]
zeroclaw-api.workspace = true
zeroclaw-config = { workspace = true, optional = true }
zeroclaw-infra = { workspace = true, optional = true }
zeroclaw-log.workspace = true
zeroclaw-spawn.workspace = true
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
dns-lookup = { version = "3", optional = true }
ring = "0.17"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
extism = "1.21"
hyper = { version = "1", default-features = false, optional = true }
http = { version = "1", optional = true }
http-body-util = { version = "0.1", optional = true }
bytes = { version = "1", optional = true }
futures-util = { version = "0.3", default-features = false, features = [
  "sink",
], optional = true }
tokio-tungstenite = { version = "0.29", default-features = false, features = [
  "connect",
  "rustls-tls-webpki-roots",
], optional = true }
reqwest = { version = "0.12", default-features = false, features = [
  "blocking",
  "rustls-tls",
  "multipart",
] }
thiserror = "2.0"
tokio = { version = "1.50", default-features = false, features = [
  "macros",
  "rt",
  "sync",
] }
toml = "1.0"
wasmtime = { version = "45", default-features = false, features = [
  "async",
  "component-model",
  "runtime",
], optional = true }
wasmtime-wasi = { version = "45", default-features = false, features = [
  "p2",
], optional = true }
wasmtime-wasi-http = { version = "45", default-features = false, features = [
  "default-send-request",
  "p2",
], optional = true }

[dev-dependencies]
tempfile = "3.26"
