[package]
name = "zeroclaw-plugins"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WASM plugin system for ZeroClaw — host, manifests, signatures, execution bridge."
publish = false

[features]
default = ["plugins-wit-v0"]
# The wasmtime component-model / WIT runtime (host imports, fuel/epoch metering,
# per-call isolation). This is the real plugin execution path.
plugins-wit-v0 = ["plugins-wasmtime"]
# wasmtime dependency + WASI p2 host bindings. Runtime-only (no JIT compiler):
# loads pre-compiled components but needs a backend feature below to compile
# from raw component bytes.
plugins-wasmtime = ["dep:wasmtime", "dep:wasmtime-wasi"]
# Compilation backends — pick one to compile components at load time.
# cranelift = optimizing JIT (x86_64/aarch64); pulley = portable interpreter.
plugins-wasm-cranelift = ["plugins-wasmtime", "wasmtime/cranelift"]
plugins-wasm-pulley = ["plugins-wasmtime", "wasmtime/pulley"]

[dependencies]
zeroclaw-log.workspace = true
zeroclaw-api.workspace = true
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
ring = "0.17"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"] }
thiserror = "2.0"
tokio = { version = "1.50", default-features = false, features = ["sync", "macros", "rt"] }
toml = "1.0"
wasmtime = { version = "44.0.3", default-features = false, features = [
  "component-model",
  "runtime",
], optional = true }
wasmtime-wasi = { version = "44.0.3", optional = true }

[dev-dependencies]
tempfile = "3.26"
# Build WIT components from inline WAT at test time, so the contract suite needs
# no prebuilt .wasm plugin (mirrors ironclaw_wasm's hermetic test fixtures).
wat = "1.245"
wit-component = "0.245"
wit-parser = "0.245"
