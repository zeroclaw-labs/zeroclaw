[package]
name = "office-tools"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ZeroClaw WASM plugin: extract text/Markdown from Office documents."
publish = false

[lib]
name = "office_tools"
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
base64 = { version = "0.22", default-features = false, features = ["std"] }
office_oxide = "0.1"

# Extism host bindings only exist on wasm. Keeping this target-scoped lets the
# pure `run()` logic compile and unit-test on the host (`cargo test`) without
# pulling in unresolved Extism host symbols at link time.
[target.'cfg(target_arch = "wasm32")'.dependencies]
extism-pdk = "1.4"

[profile.release]
opt-level = "z"
lto = true
strip = true

[workspace]
