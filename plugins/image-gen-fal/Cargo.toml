[package]
name = "image-gen-fal"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ZeroClaw WASM plugin: text-to-image generation via fal.ai Flux models."
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }

[workspace]
