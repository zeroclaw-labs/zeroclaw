[package]
name = "deepl"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "ZeroClaw WASM plugin: high-quality text translation via the DeepL API."
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }

[workspace]
