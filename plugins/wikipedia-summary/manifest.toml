name = "wikipedia-summary"
version = "0.1.0"
description = "Look up a short factual summary of a topic from Wikipedia"
author = "ZeroClaw Labs"
wasm_path = "wikipedia_summary.wasm"
capabilities = ["tool"]
# Only HTTP egress is needed; the Wikipedia REST API is public (no credentials).
# The host still enforces its SSRF allowlist, so en.wikipedia.org must be in
# [http_request].allowed_domains (or allowed_domains = ["*"]).
permissions = ["http_client"]
