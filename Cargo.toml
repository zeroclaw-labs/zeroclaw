[workspace]
members = [".", "crates/lightwave-macos"]
resolver = "2"

[package]
name = "lightwave-sys"
version = "0.2.0"
edition = "2021"
authors = ["LightWave Media"]
license = "MIT OR Apache-2.0"
description = "LightWave Augusta — local AI agent runtime for macOS."
repository = "https://github.com/lightwave-media/lightwave-sys"
readme = "README.md"
keywords = ["ai", "agent", "cli", "assistant", "macos"]
categories = ["command-line-utilities", "api-bindings"]
rust-version = "1.87"

[[bin]]
name = "augusta"
path = "src/main.rs"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"

# Async runtime
tokio = { version = "1.50", default-features = false, features = ["rt-multi-thread", "macros", "time", "net", "io-util", "sync", "process", "io-std", "fs", "signal"] }
tokio-util = { version = "0.7", default-features = false }
tokio-stream = { version = "0.1.18", default-features = false, features = ["fs", "sync"] }

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking", "multipart", "stream"] }

# Serialization
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["std"] }
serde_yaml = "0.9"
serde_ignored = "0.1"

# Config
directories = "6.0"
toml = "1.0"
shellexpand = "3.1"

# JSON Schema generation for config export
schemars = "1.2"

# Logging
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "ansi", "env-filter"] }

# Base64 encoding (screenshots, image data)
base64 = "0.22"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }

# URL encoding for web fetch
urlencoding = "2.1"

# HTML to plain text conversion (web_fetch tool)
nanohtml2text = "0.2"

# Browser automation backend (optional)
fantoccini = { version = "0.22.1", optional = true, default-features = false, features = ["rustls-tls"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# UUID generation
uuid = { version = "1.22", default-features = false, features = ["v4", "std", "serde"] }

# Authenticated encryption (AEAD) for secret store
chacha20poly1305 = "0.10"

# HMAC for webhook signature verification
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# CSPRNG for secure token generation
rand = "0.10"

# Fast mutexes
parking_lot = "0.12"

# Async traits
async-trait = "0.1"

# JWT auth
ring = "0.17"

# Memory / persistence
rusqlite = { version = "0.37", features = ["bundled", "load_extension"] }

# Local ONNX embeddings (brain vector DB)
fastembed = { version = "4", optional = true }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
chrono-tz = "0.10"

# PowerSync (local-first sync for createOS)
powersync = { version = "0.0.4", features = ["tokio"] }
http-client = { version = "6.5.3", default-features = false }

# Interactive CLI prompts
dialoguer = { version = "0.12", features = ["fuzzy-select"] }
console = "0.16"

# TUI (terminal user interface)
ratatui = { version = "0.29", default-features = false, features = ["crossterm"] }
crossterm = { version = "0.28", default-features = false, features = ["events"] }

# Globbing
glob = "0.3"

# Binary discovery
which = "8.0"

# WebSocket (provider streaming)
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }
futures-util = { version = "0.3", default-features = false, features = ["sink"] }
regex = "1.10"
hostname = "0.4.2"
rustls = "0.23"
rustls-pki-types = "1.14.0"
tokio-rustls = "0.26.4"
webpki-roots = "1.0.6"

# HTTP server (for health/status endpoint, optional)
axum = { version = "0.8", default-features = false, features = ["http1", "json", "tokio", "query", "macros"], optional = true }

# Unix-specific dependencies
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
lightwave-macos = { path = "crates/lightwave-macos" }

[features]
default = ["createos"]
createos = []
brain = ["dep:fastembed"]
browser-native = ["dep:fantoccini"]
gateway = ["dep:axum"]

# Suppress warnings for stripped feature flags still referenced in cfg gates
[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = [
    'cfg(feature, values("channel-nostr", "createos", "memory-postgres", "rag-pdf"))',
]

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.release-fast]
inherits = "release"
codegen-units = 8

[dev-dependencies]
tempfile = "3.26"
wiremock = "0.6"
scopeguard = "1.2"
