# Parity data for the ZeroClaw / OpenClaw / Hermes comparison columns of the
# feature-and-support matrix. The ZeroClaw column is NOT here: it is walked from
# the code registries at generation time. This file carries only the two
# external columns the binary has no knowledge of.
#
# Regenerate the page with `cargo generate docs`; drift is gated in CI with
# `cargo generate docs --check`. A walked ZeroClaw row with no entry here renders
# `Unknown` in the external columns; fill it in as parity is confirmed. A key
# here that the source walk no longer produces is a hard error.
#
# Status vocabulary matches the page legend: supported | partial | experimental
# | planned | none | unknown.
#
# Sources (checked 2026-07-04):
#   OpenClaw channels: https://docs.openclaw.ai/channels
#   Hermes channels/providers: https://hermesagents.net/integrations
# OpenClaw does not publish a per-slot provider or per-tool inventory in a form
# that maps cleanly onto ZeroClaw's registries, so those columns stay `unknown`
# rather than guessed. Update as authoritative sources are confirmed.

