schema_version = 3

# Provider entry. Section header is `[providers.models.<type>.<alias>]`:
#   `anthropic` = type (fixed provider family name)
#   `home`      = alias (you pick any name)
[providers.models.anthropic.home]
model = "claude-sonnet-4-6"
temperature = 0.7            # omit this line entirely to send no temperature override
                             # (required for claude-opus-4-7 — see below)
api_key = "sk-ant-..."

# Agent. Section header is `[agents.<alias>]`:
#   `assistant` = alias (you pick any name)
[agents.assistant]
model_provider = "anthropic.home"   # `<type>.<alias>` reference to the entry above
risk_profile   = "assistant"        # alias reference to the section below

# Risk profile. Section header is `[risk_profiles.<alias>]`:
#   `assistant` = must match agents.assistant.risk_profile
[risk_profiles.assistant]
level = "supervised"

# --- Alternate provider entry: claude-opus-4-7 rejects any temperature
# setting, so its `[providers.models.anthropic.<alias>]` block must omit
# the `temperature` line entirely. To switch the agent to this entry,
# set `agents.assistant.model_provider = "anthropic.opus"`.
# [providers.models.anthropic.opus]
# model = "claude-opus-4-7"
# api_key = "sk-ant-..."
