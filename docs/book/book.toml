[book]
title = "ZeroClaw Docs"
description = "Documentation for the ZeroClaw personal AI assistant."
authors = ["ZeroClaw Labs"]
language = "en"
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/singlerider/zeroclaw"
edit-url-template = "https://github.com/singlerider/zeroclaw/edit/master/docs/book/{path}"
site-url = "/"
additional-js = ["theme/lang-switcher.js", "mermaid.min.js", "mermaid-init.js"]
additional-css = ["theme/custom.css"]

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[preprocessor.gettext]
after = ["links"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
