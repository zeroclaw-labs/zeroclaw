# Run the ZeroClaw nominated relay (blind forwarder).
#
#   cd apps/zerorelay && podman compose up --build      # (or `docker compose`)
#
# Build context is the repository root because zerorelay is a workspace member.
services:
  zerorelay:
    build:
      context: ../..
      dockerfile: apps/zerorelay/Dockerfile
    image: zeroclaw/zerorelay:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    # The relay terminates an outer TLS session, so it needs its own server cert.
    # Drop relay.crt + relay.key in ./certs (e.g. a Let's Encrypt cert for the
    # relay's public hostname, or a self-signed cert the daemons/clients pin/trust).
    volumes:
      - ./certs:/etc/zerorelay/certs:ro
    # Admission defaults to `open` (any signed daemon may register). For an
    # approved-only relay switch to allowlist and pass the accepted daemon pubkey
    # FINGERPRINT(s) (sha256 hex); the shared-secret gate is --relay-token:
    #   command: ["--bind", "0.0.0.0:8443", "--tls-cert", "/etc/zerorelay/certs/relay.crt", "--tls-key", "/etc/zerorelay/certs/relay.key", "--registration-mode", "allowlist", "--allow", "<daemon-pubkey-fingerprint>"]
    command: ["--bind", "0.0.0.0:8443", "--tls-cert", "/etc/zerorelay/certs/relay.crt", "--tls-key", "/etc/zerorelay/certs/relay.key", "--registration-mode", "open"]
    healthcheck:
      # distroless has no shell; probe via the binary's own subcommand.
      test: ["CMD", "/usr/local/bin/zerorelay", "healthcheck", "--addr", "127.0.0.1:8443"]
      interval: 30s
      timeout: 5s
      retries: 3
