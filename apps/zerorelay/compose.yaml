# Run the ZeroClaw nominated relay (blind forwarder).
#
#   cd apps/zerorelay && podman compose up --build      # (or `docker compose`)
#
# Build context is the repository root because zerorelay is a workspace member.
services:
  zerorelay:
    build:
      context: ../..
      dockerfile: apps/zerorelay/Dockerfile
    image: zeroclaw/zerorelay:latest
    restart: unless-stopped
    ports:
      - "8443:8443"
    # The relay SELF-PROVISIONS its outer TLS cert into /data/tls on first run
    # (no openssl). The volume persists it so the CA daemons/clients trust survives
    # restarts; the CA lands at /data/tls/ca.crt (copy it to daemons/clients, or
    # read it from the volume). Add --tls-san <public-host> for a reachable relay.
    volumes:
      - relay-data:/data
    # Admission defaults to `open` (any signed daemon may register). For an
    # approved-only relay switch to allowlist and pass the accepted daemon pubkey
    # FINGERPRINT(s) (sha256 hex); the shared-secret gate is --relay-token:
    #   command: ["--bind", "0.0.0.0:8443", "--tls-dir", "/data/tls", "--tls-san", "relay.example.com", "--registration-mode", "allowlist", "--allow", "<daemon-pubkey-fingerprint>"]
    command: ["--bind", "0.0.0.0:8443", "--tls-dir", "/data/tls", "--registration-mode", "open"]
    healthcheck:
      # distroless has no shell; probe via the binary's own subcommand.
      test: ["CMD", "/usr/local/bin/zerorelay", "healthcheck", "--addr", "127.0.0.1:8443"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  relay-data:
