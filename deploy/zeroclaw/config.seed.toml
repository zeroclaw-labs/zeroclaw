# deploy/zeroclaw/config.seed.toml — seeded once to /zeroclaw-data/.zeroclaw/config.toml on first boot.
#
# Per-persona values (bot tokens, agent id) come from Fly secrets and are
# NOT in this seed — zeroclaw reads TELEGRAM_BOT_TOKEN / SLACK_* / ANTHROPIC_API_KEY
# from env at runtime. The seed only establishes the provider routing
# (through adi-cliproxy) and the memory backend (Postgres → Supabase).
#
# After seed, /zeroclaw-data/.zeroclaw/config.toml is authoritative.
# Edit via `fly ssh console` to add channels, adjust autonomy, etc.

workspace_dir       = "/zeroclaw-data/workspace"
config_path         = "/zeroclaw-data/.zeroclaw/config.toml"

# LLM routing: all traffic goes through adi-cliproxy. Using Fly's 6PN
# internal DNS (resolves to adi-cliproxy's private IPv6) instead of
# Tailscale — Fly's private network is reachable from the container
# without proxying, while Tailscale userspace-networking is not.
default_provider    = "custom:http://adi-cliproxy.internal:8317/v1"
# cliproxy passes the model name straight through to Claude, so no
# OpenRouter-style "anthropic/" prefix. See openclaw.shane.json for
# the full list: claude-sonnet-4-6 / claude-opus-4-6 / claude-haiku-4-5-20251001.
default_model       = "claude-sonnet-4-6"
default_temperature = 0.7

[gateway]
port              = 42617
host              = "[::]"
allow_public_bind = true
# Require the dashboard + API to be paired before use. Pairing happens
# once per device: POST /pair with an X-Pairing-Code header. Generate
# a code on the machine via `zeroclaw pair` over ssh or `fly proxy`.
# Once paired, the device's bearer token persists and the dashboard
# works normally.
require_pairing   = true
web_dist_dir      = "/app/web/dist"

[autonomy]
level = "full"
auto_approve = [
    "file_read", "file_write", "file_edit",
    "memory_recall", "memory_store",
    "web_search_tool", "web_fetch",
    "calculator", "glob_search", "content_search",
    "image_info", "weather", "git_operations"
]

[memory]
backend   = "postgres"
auto_save = true

[memory.postgres]
# Pulled from POSTGRES_URL env (Fly secret). Table created on first
# connection. Per-persona table name is injected by entrypoint.sh from
# ZEROCLAW_MEMORY_POSTGRES_TABLE (set in fly.<persona>.toml).
schema               = "zeroclaw"
max_connections      = 5
connect_timeout_secs = 10

# ── Channels ──────────────────────────────────────────────────────────
# Bot tokens come from Fly secrets (TELEGRAM_BOT_TOKEN / SLACK_* —
# zeroclaw reads them as env vars at runtime). Listing the channel
# sections here enables the channel supervisor to start them.

[channels.telegram]
enabled   = true
# Token is interpolated from TELEGRAM_BOT_TOKEN env var by entrypoint.sh.
bot_token = "${TELEGRAM_BOT_TOKEN}"
# Shane + Meg both allowed on both bots (from openclaw.{shane,meg}.json
# channels.telegram.allowFrom). IDs are Telegram numeric user IDs.
#   Shane: 7559901218
#   Meg:   8636712032
allowed_users = ["7559901218", "8636712032"]
mention_only  = false

# ── Agent behavior ──────────────────────────────────────────────────────
[agent]
# Disable the "should I reply?" classifier pre-check. The classifier is
# a small LLM call that decides whether a channel message is addressed
# to "the assistant". For personas with custom names (e.g. "Adi"), the
# classifier can't reliably map "Hi Adi" to "addressed to the assistant"
# even with IDENTITY.md guidance — it routinely returns NO_REPLY. Adi
# can still refuse via the main response; we just skip the hardcoded
# gate. This is our patched field (adds to upstream v0.7.3).
reply_intent_check_enabled = false

# ── Composio (managed OAuth tools — gives us Todoist + 1000 others) ─────
# Zeroclaw has no native Todoist support; Todoist goes through Composio.
# COMPOSIO_API_KEY is a Fly secret; entrypoint.sh interpolates it.
# entity_id is per-persona so shane's Todoist OAuth and meg's don't
# cross-wire. Values come from the entrypoint: PERSONA env is "shane" or "meg".
[composio]
enabled   = true
api_key   = "${COMPOSIO_API_KEY}"
entity_id = "${PERSONA}"

[channels.slack]
enabled   = true
# SLACK_BOT_TOKEN = xoxb-... (bot OAuth token)
bot_token = "${SLACK_BOT_TOKEN}"
# SLACK_APP_TOKEN = xapp-... (app-level token, enables Socket Mode).
# SLACK_SIGNING_SECRET exists as a Fly secret but zeroclaw's SlackConfig
# doesn't use it — it's a webhook-mode thing, and we run Socket Mode.
app_token = "${SLACK_APP_TOKEN}"
# Slack user IDs (not workspace IDs) of Shane + Meg from
# openclaw.{shane,meg}.json channels.slack.allowFrom.
#   Shane: U0ATMP4SGDD
#   Meg:   U0ATQKX5ZGD
allowed_users = ["U0ATMP4SGDD", "U0ATQKX5ZGD"]
