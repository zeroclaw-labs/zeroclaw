# deploy/zeroclaw/fly.meg.toml — Meg's zeroclaw persona.
# Identical to fly.shane.toml except app name, volume name, and table name.

app            = "adi-zeroclaw-meg"
primary_region = "iad"

[experimental]
  privileged = true

[env]
  ZEROCLAW_WORKSPACE = "/zeroclaw-data/workspace"
  ZEROCLAW_MEMORY_POSTGRES_TABLE = "memories_meg"

[[mounts]]
  source       = "zeroclaw_meg_data"
  destination  = "/zeroclaw-data"
  initial_size = "3gb"

[http_service]
  internal_port        = 42617
  force_https          = true
  auto_start_machines  = true
  auto_stop_machines   = "off"
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  interval     = "30s"
  timeout      = "5s"
  grace_period = "30s"
  method       = "get"
  path         = "/health"

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "1024mb"
  cpu_kind = "shared"
