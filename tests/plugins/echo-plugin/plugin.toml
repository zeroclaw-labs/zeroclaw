[plugin]
name = "echo-plugin"
version = "0.1.0"
description = "Echoes JSON input back as output — used for round-trip integration tests."
wasm_path = "echo_plugin.wasm"
capabilities = ["tool"]

[[tools]]
name = "tool_echo"
description = "Accepts any JSON object and returns it unchanged."
export = "tool_echo"
risk_level = "low"

[tools.parameters_schema]
type = "object"
