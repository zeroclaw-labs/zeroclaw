[workspace]
members = [
    "echo-plugin",
    "multi-tool-plugin",
    "bad-actor-plugin",
    "http-plugin",
    "fs-plugin",
]
resolver = "2"

[workspace.dependencies]
extism-pdk = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
