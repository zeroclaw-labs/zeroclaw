# PR #8 eval thresholds — CI reads this to decide pass/fail.
#
# Each domain entry defines minimum acceptable values. Missing metrics
# fall back to "warn only" (no build fail). Raise as the corpus grows;
# see tests/evals/README.md.

[law]
# Corpus now at 30 queries per the roadmap target; raised recall to 0.90
# matching spec. precision + mrr floor stays lenient because FTS-only
# baseline (no ONNX) is expected to drop with corpus growth.
context_recall_min    = 0.90
context_precision_min = 0.15
mrr_min               = 0.50

[ko]
# 50-query corpus. Recall 0.90 matches spec; precision floor is
# intentionally lower because FTS5 trigram tokenisation produces more
# noise on short Korean queries (1-3 noun phrases).
context_recall_min    = 0.90
mrr_min               = 0.50

[en]
# 30-query corpus. 0.90 recall / 0.20 precision are both achievable on
# FTS5 English (longer queries + unambiguous keywords).
context_recall_min    = 0.90
context_precision_min = 0.20
mrr_min               = 0.70

[overall]
# Regression guard: fail the job if overall context_recall drops by
# more than this fraction vs. the previous main-branch baseline.
# The baseline file is fetched by the CI workflow.
max_regression_fraction = 0.05
