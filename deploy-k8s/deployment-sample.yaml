apiVersion: apps/v1
kind: Deployment
metadata:
  name: daemonclaw
  namespace: daemonclaw
  labels:
    app.kubernetes.io/name: daemonclaw
    app.kubernetes.io/part-of: daemonclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daemonclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daemonclaw
        app.kubernetes.io/part-of: daemonclaw
    spec:
      containers:
        - name: daemonclaw
          # For production, pin to a version tag (e.g. ghcr.io/DeliveryBoyTech/daemonclaw:v0.7.1)
          image: ghcr.io/DeliveryBoyTech/daemonclaw:latest
          args: ["daemon"]
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: daemonclaw-api-key
                  key: api-key
            - name: LANG
              value: "C.UTF-8"
            - name: HOME
              value: "/daemonclaw-data"
            - name: DAEMONCLAW_WORKSPACE
              value: "/daemonclaw-data/workspace"
            - name: DAEMONCLAW_GATEWAY_PORT
              value: "42617"
          volumeMounts:
            - name: state
              mountPath: /daemonclaw-data/.daemonclaw
            - name: config
              mountPath: /daemonclaw-data/.daemonclaw/config.toml
              subPath: config.toml
              readOnly: true
            - name: workspace
              mountPath: /daemonclaw-data/workspace
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: daemonclaw-config
        - name: state
          emptyDir: {}
        - name: workspace
          emptyDir: {}
