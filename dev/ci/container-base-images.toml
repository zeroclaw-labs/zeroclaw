zone = "base-arg-rust-slim"
arg = "ZEROCLAW_BASE_RUST_SLIM"
registry = "dockerhub"
repo = "library/rust"
image_ref = "rust"
tag = "1.94-slim"
digest = "sha256:cf09adf8c3ebaba10779e5c23ff7fe4df4cccdab8a91f199b0c142c53fef3e1a"

[[image]]
zone = "base-arg-rust-bookworm"
