# Development Environment for JhedaiClaw Agentic Testing
#
# Use this for:
# - Running the agent in a sandboxed environment
# - Testing dangerous commands safely
# - Developing new skills/integrations
#
# Usage:
#   cd dev && ./cli.sh up
#   or from root: ./dev/cli.sh up
name: jhedaiclaw-dev
services:
  # ── The Agent (Development Image) ──
  # Builds from source using the 'dev' stage of the root Dockerfile
  jhedaiclaw-dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    container_name: jhedaiclaw-dev
    restart: unless-stopped
    environment:
      - JHEDAICLAW_GATEWAY_PORT=42617
      - SANDBOX_HOST=jhedaiclaw-sandbox
    secrets:
      - source: jhedaiclaw_env
        target: jhedaiclaw_env
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        if [ -f /run/secrets/jhedaiclaw_env ]; then
          set -a
          . /run/secrets/jhedaiclaw_env
          set +a
        fi
        exec jhedaiclaw gateway --port "${JHEDAICLAW_GATEWAY_PORT:-42617}" --host "[::]"
    volumes:
      # Mount single config file (avoids shadowing other files in .jhedaiclaw)
      - ../target/.jhedaiclaw/config.toml:/jhedaiclaw-data/.jhedaiclaw/config.toml
      # Mount shared workspace
      - ../playground:/jhedaiclaw-data/workspace
    ports:
      - "127.0.0.1:42617:42617"
    networks:
      - dev-net

  # ── The Sandbox (Ubuntu Environment) ──
  # A fully loaded Ubuntu environment for the agent to play in.
  sandbox:
    build:
      context: sandbox # Context relative to dev/
      dockerfile: Dockerfile
    container_name: jhedaiclaw-sandbox
    hostname: dev-box
    command: ["tail", "-f", "/dev/null"]
    working_dir: /home/developer/workspace
    user: developer
    environment:
      - TERM=xterm-256color
      - SHELL=/bin/bash
    volumes:
      - ../playground:/home/developer/workspace # Mount local playground
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge

secrets:
  jhedaiclaw_env:
    file: ../.env
