name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write
    id-token: write # Required for cosign keyless signing via OIDC

env:
    CARGO_TERM_COLOR: always

jobs:
    build-release:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 40
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: blacksmith-2vcpu-ubuntu-2404
                      artifact: zeroclaw
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      artifact: zeroclaw
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: zeroclaw
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: zeroclaw.exe

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

            - name: Build release
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Check binary size (Unix)
              if: runner.os != 'Windows'
              run: |
                  SIZE=$(stat -f%z target/${{ matrix.target }}/release/${{ matrix.artifact }} 2>/dev/null || stat -c%s target/${{ matrix.target }}/release/${{ matrix.artifact }})
                  echo "Binary size: $((SIZE / 1024 / 1024))MB ($SIZE bytes)"
                  if [ "$SIZE" -gt 5242880 ]; then
                    echo "::warning::Binary exceeds 5MB target"
                  fi

            - name: Package (Unix)
              if: runner.os != 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release
                  tar czf ../../../zeroclaw-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

            - name: Package (Windows)
              if: runner.os == 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release
                  7z a ../../../zeroclaw-${{ matrix.target }}.zip ${{ matrix.artifact }}

            - name: Upload artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: zeroclaw-${{ matrix.target }}
                  path: zeroclaw-${{ matrix.target }}.*

    package-macos-intel:
        name: Package macOS Intel (DMG)
        runs-on: macos-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  targets: x86_64-apple-darwin

            - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

            - name: Setup Node.js
              uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: mission-control/package-lock.json

            - name: Download x86_64 Node.js for Intel bundle
              run: |
                  NODE_VERSION=$(node --version | sed 's/^v//')
                  curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
                    | tar xz -C /tmp
                  echo "NODE_BIN=/tmp/node-v${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

            - name: Set cross-compilation environment
              run: |
                  echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
                  echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> "$GITHUB_ENV"

            - name: Update dependencies to avoid yanked crates
              run: cargo update

            - name: Build packaged app
              env:
                  VERSION: ${{ github.ref_name }}
              run: scripts/release/package_macos_intel.sh

            - name: Upload macOS Intel package artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: clawpilot-macos-intel
                  path: |
                      dist/ClawPilot-macos-intel-*.zip
                      dist/ClawPilot-macos-intel-*.dmg

    publish:
        name: Publish Release
        needs: [build-release, package-macos-intel]
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Download all artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  path: artifacts

            - name: Generate SHA256 checksums
              run: |
                  cd artifacts
                  find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS
                  echo "Generated checksums:"
                  cat SHA256SUMS

            - name: Install cosign
              uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

            - name: Sign artifacts with cosign (keyless)
              run: |
                  for file in artifacts/**/*; do
                    [ -f "$file" ] || continue
                    cosign sign-blob --yes \
                      --oidc-issuer=https://token.actions.githubusercontent.com \
                      --output-signature="${file}.sig" \
                      --output-certificate="${file}.pem" \
                      "$file"
                  done

            - name: Create GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  generate_release_notes: true
                  files: |
                      artifacts/**/*
                      artifacts/SHA256SUMS
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
