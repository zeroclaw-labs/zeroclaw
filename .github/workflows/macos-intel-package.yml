name: macOS Intel Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mission-control/package-lock.json

      - name: Download x86_64 Node.js for Intel bundle
        run: |
          NODE_VERSION=$(node --version | sed 's/^v//')
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
            | tar xz -C /tmp
          echo "NODE_BIN=/tmp/node-v${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

      - name: Set cross-compilation environment
        run: |
          echo "SDKROOT=$(xcrun -sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> "$GITHUB_ENV"

      - name: Update dependencies to avoid yanked crates
        run: cargo update

      - name: Build packaged app
        run: |
          scripts/release/package_macos_intel.sh

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: clawpilot-macos-intel-zip
          path: dist/ClawPilot-macos-intel-*.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: clawpilot-macos-intel-dmg
          path: dist/ClawPilot-macos-intel-*.dmg
