name: Claude PR Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      # For issue_comment events, checkout the PR head by immutable SHA + repo
      # to avoid mutable branch ref drift and fork repo ambiguity.
      - name: Resolve PR head ref
        id: pr-ref
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_repo=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRepository -q '.headRepository.nameWithOwner')
          pr_sha=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid -q '.headRefOid')
          echo "repository=$pr_repo" >> "$GITHUB_OUTPUT"
          echo "ref=$pr_sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ steps.pr-ref.outputs.repository || github.repository }}
          ref: ${{ steps.pr-ref.outputs.ref || github.sha }}
          fetch-depth: 1

      - uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review this pull request. Focus on:
            - Bugs, logic errors, and edge cases
            - Security issues (injection, secrets, input validation)
            - Code quality and consistency with existing patterns
            Post a review comment summarizing your findings.
