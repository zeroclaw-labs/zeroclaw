name: Version Sync

# Auto-sync all hardcoded version references whenever Cargo.toml
# version changes on master. Also available as manual dispatch.
on:
  push:
    branches: [master]
    paths: [Cargo.toml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Version References
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Run version sync script
        env:
          SYNC_VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/release/bump-version.sh "$SYNC_VERSION"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All references already in sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Files changed:"
            git diff --name-only
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync version references to v${VERSION}"
          git push
