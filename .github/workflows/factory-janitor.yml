name: Factory Janitor

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - comment-only
          - apply-safe
      checks:
        description: "Comma-separated checks"
        required: true
        default: "fixed-by-merged-pr,explicit-duplicates,superseded-prs,open-pr-links,implemented-on-master-preview,similarity-preview"
      max_mutations:
        description: "Maximum comments/closures in non-preview modes"
        required: true
        default: "25"

concurrency:
  group: factory-janitor
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  janitor:
    name: Factory Janitor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run factory janitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event_name == 'schedule' && 'preview' || inputs.mode }}
          CHECKS: ${{ github.event_name == 'schedule' && 'fixed-by-merged-pr,explicit-duplicates,superseded-prs,open-pr-links,implemented-on-master-preview,similarity-preview' || inputs.checks }}
          MAX_MUTATIONS: ${{ github.event_name == 'schedule' && '25' || inputs.max_mutations }}
        run: |
          python3 .claude/skills/factory-janitor/scripts/factory_janitor.py \
            --repo "$GITHUB_REPOSITORY" \
            --mode "$MODE" \
            --checks "$CHECKS" \
            --max-mutations "$MAX_MUTATIONS" \
            --summary-file artifacts/factory-janitor/summary.md

      - name: Add job summary
        run: cat artifacts/factory-janitor/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: factory-janitor-audit
          path: artifacts/factory-janitor/*.json
          if-no-files-found: error
