name: Retrieval Eval

on:
    push:
        branches: [dev, main]
        paths:
            - 'src/memory/**'
            - 'src/vault/**'
            - 'tests/evals/**'
            - 'src/bin/moa_eval.rs'
            - '.github/workflows/eval.yml'
    pull_request:
        branches: [dev, main]
        paths:
            - 'src/memory/**'
            - 'src/vault/**'
            - 'tests/evals/**'
            - 'src/bin/moa_eval.rs'
            - '.github/workflows/eval.yml'

concurrency:
    group: retrieval-eval-${{ github.event.pull_request.number || github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    eval:
        name: Run RAGAS-style retrieval harness
        runs-on: ubuntu-22.04
        timeout-minutes: 20
        env:
            CARGO_TERM_COLOR: always
            CARGO_INCREMENTAL: "0"
        steps:
            - name: Checkout
              # v4.1.7 — pinned SHA per docs/actions-source-policy.md.
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup default stable

            - name: Build moa_eval
              run: cargo build --bin moa_eval --locked

            - name: Run retrieval evaluation
              id: eval
              run: |
                  set -o pipefail
                  cargo run --bin moa_eval --quiet -- \
                      --output eval-report.json \
                      --top-k 10
                  echo "--- text report ---"
                  cargo run --bin moa_eval --quiet

            - name: Upload eval report
              if: always()
              # v4.3.4 — pinned SHA per docs/actions-source-policy.md.
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
              with:
                  name: eval-report-${{ github.run_id }}
                  path: eval-report.json
                  retention-days: 30

            # Baseline-regression diff intentionally omitted from this
            # revision — the artifact-download action
            # (dawidd6/action-download-artifact) is not yet on the repo's
            # actions-source-policy allowlist. Re-enable in a follow-up PR
            # once the allowlist is updated or once a replacement workflow
            # uploads the baseline to a managed location. The threshold
            # `tests/evals/thresholds.toml::overall.max_regression_fraction`
            # stays in place for when that happens.

            - name: Post PR comment
              if: github.event_name == 'pull_request' && always()
              # v7.0.1 — pinned SHA per docs/actions-source-policy.md.
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
              with:
                  script: |
                      const fs = require('fs');
                      const path = 'eval-report.json';
                      if (!fs.existsSync(path)) {
                          core.warning('eval-report.json missing — skip PR comment');
                          return;
                      }
                      const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                      const r = data.report;
                      const v = data.violations || [];
                      let body = '## Retrieval Eval (PR #8)\n\n';
                      body += `top-k = ${r.top_k}\n\n`;
                      body += '| domain | N | recall | precision | mrr |\n';
                      body += '|--------|---|--------|-----------|-----|\n';
                      for (const s of r.sets) {
                          body += `| ${s.domain} | ${s.queries} | ${s.context_recall.toFixed(3)} | ${s.context_precision.toFixed(3)} | ${s.mrr.toFixed(3)} |\n`;
                      }
                      body += `| **overall** | **${r.overall.queries}** | **${r.overall.context_recall.toFixed(3)}** | **${r.overall.context_precision.toFixed(3)}** | **${r.overall.mrr.toFixed(3)}** |\n\n`;
                      body += v.length === 0
                          ? ':white_check_mark: All thresholds met.\n'
                          : `:x: **${v.length} threshold violation(s):**\n` + v.map(x => `- ${x}`).join('\n') + '\n';
                      body += '\n<sub>Generated by `.github/workflows/eval.yml`. Edit thresholds in `tests/evals/thresholds.toml`.</sub>';
                      // Idempotent comment: replace the previous one if present.
                      const { data: comments } = await github.rest.issues.listComments({
                          ...context.repo,
                          issue_number: context.issue.number,
                      });
                      const marker = '## Retrieval Eval (PR #8)';
                      const prior = comments.find(c => c.body && c.body.startsWith(marker));
                      if (prior) {
                          await github.rest.issues.updateComment({
                              ...context.repo,
                              comment_id: prior.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              ...context.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
