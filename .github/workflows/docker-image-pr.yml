name: Docker Image PR Check

on:
  pull_request:
    branches: [master]
    paths:
      - Dockerfile
      - Dockerfile.debian
      - Dockerfile.ci
      - Dockerfile.debian.ci
      - .dockerignore
      - dev/config.template.toml
      - .github/workflows/docker-image-pr.yml
      - .github/workflows/release-stable-manual.yml
      - scripts/ci/prepare_docker_context.sh

concurrency:
  group: docker-image-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  images:
    name: Docker Images Build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare Docker smoke context
        run: bash scripts/ci/prepare_docker_context.sh smoke docker-ctx

      - name: Build default image
        run: docker build -f docker-ctx/Dockerfile -t zeroclaw-pr-default:smoke docker-ctx

      - name: Build Debian compatibility image
        run: docker build -f docker-ctx/Dockerfile.debian -t zeroclaw-pr-debian:smoke docker-ctx

  # Compiles the real source Dockerfiles (not the pre-built-binary `*.ci`
  # variants above). The default `Dockerfile` is built for both published
  # platforms, proving the arm64 cross-compilation path before a tag triggers
  # docker-publish.yml; `Dockerfile.debian` stays amd64-only until the same
  # cross-build support lands there. `push: false` and `contents: read` only —
  # this never publishes. Split per matrix entry so the slow arm64 cross-build
  # does not serialize behind the others.
  source-images:
    name: Dockerfile Source Build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            platform: linux/amd64
            tag: zeroclaw-pr-source-default:build
            cache-scope: docker-source-default-amd64
          - dockerfile: Dockerfile
            platform: linux/arm64
            tag: zeroclaw-pr-source-default:build
            cache-scope: docker-source-default-arm64
          - dockerfile: Dockerfile.debian
            platform: linux/amd64
            tag: zeroclaw-pr-source-debian:build
            cache-scope: docker-source-debian
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build ${{ matrix.dockerfile }} (${{ matrix.platform }}) from source
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          platforms: ${{ matrix.platform }}
          tags: ${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,scope=${{ matrix.cache-scope }},mode=max
