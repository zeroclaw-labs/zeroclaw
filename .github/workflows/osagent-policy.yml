name: osAgent Policy

# osAgent-specific CI policy gate. Runs alongside upstream's `Quality Gate`
# (.github/workflows/ci.yml) which we keep verbatim for the first half of M1.
# Phase 1.4+ may disable the upstream lint/build/test jobs once whole-crate
# drops break their assumptions; this file is the policy contract that stays
# green throughout.
#
# Owner: osAgent
# Triggers: on PR to osagent-main, on push to osagent-main, daily on schedule
#           (advisory DB refresh)
# Required for merge: all jobs in this workflow must pass.

on:
  pull_request:
    branches: [osagent-main]
  push:
    branches: [osagent-main]
  schedule:
    # Daily at 04:17 UTC — picks up new advisories overnight
    - cron: "17 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: osagent-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # cargo-deny (licenses + bans + sources): the load-bearing supply-chain gate.
  #
  # Catches: AGPL Signal SDK regression, WTFPL frankenstein regression,
  # phone-home crate regression, unknown git/registry source regression.
  # ────────────────────────────────────────────────────────────────────────
  cargo-deny-licenses-bans-sources:
    name: cargo-deny (licenses + bans + sources)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          fetch-depth: 1

      - name: cargo-deny check (licenses + bans + sources)
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2.0.20
        with:
          command: check licenses bans sources

  # ────────────────────────────────────────────────────────────────────────
  # cargo-deny (advisories): separate job so a transient rustsec advisory
  # DB hiccup or a newly-disclosed CVE in a transitive dep doesn't block
  # PR merging while we triage. Runs on a schedule too.
  # ────────────────────────────────────────────────────────────────────────
  cargo-deny-advisories:
    name: cargo-deny (advisories)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.0
        with:
          fetch-depth: 1

      - name: cargo-deny check (advisories)
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2.0.20
        with:
          command: check advisories

  # ────────────────────────────────────────────────────────────────────────
  # Placeholder slots for Phase 1.2+ additions.
  # Phase 1.3 will add `wizard-no-mcp-gate` here (the 4-layer MCP exclusion
  # CI gate — source-grep + nm --defined-only + cargo-bloat + strings).
  # Phase 1.5 will add `manifest-divergence` (verify [declared] == [detected]
  # sections of MANIFEST.toml).
  # Phase 1.6 will add `gateway-ws-only-check`.
  # ────────────────────────────────────────────────────────────────────────
