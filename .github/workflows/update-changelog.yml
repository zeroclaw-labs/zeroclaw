name: Update Changelog

# Triggered after a stable release is published, or manually.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate changelog for (e.g. 0.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-changelog:
    name: Sync Changelog
    # Only run for stable releases (skip betas/pre-releases)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            # Strip 'v' prefix from release tag
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run changelog generator
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          # Convert ISO timestamp to YYYY-MM-DD if set
          if [ -n "$RELEASE_PUBLISHED_AT" ]; then
            export RELEASE_DATE="${RELEASE_PUBLISHED_AT%%T*}"
          fi
          chmod +x .github/scripts/update-changelog.sh
          .github/scripts/update-changelog.sh "$VERSION"

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "ZeroClaw Bot"
          git config user.email "bot@zeroclaw.dev"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git commit -m "docs(changelog): sync v${VERSION} release notes"
          git push origin HEAD:master
