name: CI Reproducible Build

on:
    push:
        branches: [dev, main]
        paths:
            - "Cargo.toml"
            - "Cargo.lock"
            - "src/**"
            - "crates/**"
            - "scripts/ci/ensure_c_toolchain.sh"
            - "scripts/ci/ensure_cargo_component.sh"
            - "scripts/ci/ensure_cc.sh"
            - "scripts/ci/reproducible_build_check.sh"
            - "scripts/ci/self_heal_rust_toolchain.sh"
            - "scripts/ci/workflow_latency_report.py"
            - ".github/workflows/ci-reproducible-build.yml"
    pull_request:
        branches: [dev, main]
        paths:
            - "Cargo.toml"
            - "Cargo.lock"
            - "src/**"
            - "crates/**"
            - "scripts/ci/ensure_c_toolchain.sh"
            - "scripts/ci/ensure_cargo_component.sh"
            - "scripts/ci/ensure_cc.sh"
            - "scripts/ci/reproducible_build_check.sh"
            - "scripts/ci/self_heal_rust_toolchain.sh"
            - "scripts/ci/workflow_latency_report.py"
            - ".github/workflows/ci-reproducible-build.yml"
    schedule:
        - cron: "45 5 * * 1" # Weekly Monday 05:45 UTC
    workflow_dispatch:
        inputs:
            fail_on_drift:
                description: "Fail workflow if deterministic hash drift is detected"
                required: true
                default: true
                type: boolean
            allow_build_id_drift:
                description: "Treat GNU build-id-only drift as non-blocking"
                required: true
                default: true
                type: boolean

concurrency:
    group: repro-build-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref || github.run_id }}
    cancel-in-progress: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}

permissions:
    contents: read

env:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: core.hooksPath
    GIT_CONFIG_VALUE_0: /dev/null
    CARGO_TERM_COLOR: always

jobs:
    reproducibility:
        name: Reproducible Build Probe
        runs-on: ubuntu-22.04
        timeout-minutes: 75
        env:
            CARGO_HOME: ${{ github.workspace }}/.ci-rust/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}/cargo
            RUSTUP_HOME: ${{ github.workspace }}/.ci-rust/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}/rustup
            CARGO_TARGET_DIR: ${{ github.workspace }}/.ci-rust/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}/target
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Self-heal Rust toolchain cache
              shell: bash
              run: ./scripts/ci/self_heal_rust_toolchain.sh 1.92.0

            - name: Ensure C toolchain
              shell: bash
              run: bash ./scripts/ci/ensure_c_toolchain.sh

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0

            - name: Ensure C toolchain for Rust builds
              run: ./scripts/ci/ensure_cc.sh
            - name: Ensure cargo component
              shell: bash
              env:
                  ENSURE_CARGO_COMPONENT_STRICT: "true"
              run: bash ./scripts/ci/ensure_cargo_component.sh 1.92.0

            - name: Run reproducible build check
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p artifacts
                  if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
                    host_target="$(rustc -vV | sed -n 's/^host: //p')"
                    profile="release-fast"
                    binary_path="${CARGO_TARGET_DIR}/${host_target}/${profile}/zeroclaw"

                    cargo clean
                    cargo build --profile "${profile}" --locked --target "${host_target}" --verbose

                    if [ ! -f "${binary_path}" ]; then
                      echo "expected artifact not found: ${binary_path}" >&2
                      exit 2
                    fi

                    sha="$(sha256sum "${binary_path}" | awk '{print $1}')"
                    cat > artifacts/reproducible-build.json <<EOF
                  {
                    "schema_version": "zeroclaw.audit.v1",
                    "event_type": "reproducible_build",
                    "profile": "${profile}",
                    "target": "${host_target}",
                    "binary": "zeroclaw",
                    "first_sha256": "${sha}",
                    "second_sha256": "",
                    "status": "quick_probe",
                    "drift_reason": "pull_request_fast_path",
                    "allow_build_id_drift": "true",
                    "first_build_id": "",
                    "second_build_id": ""
                  }
                  EOF

                    cat > artifacts/reproducible-build.md <<EOF
                  # Reproducible Build Check

                  - Mode: \`quick_probe\`
                  - Trigger: \`pull_request\`
                  - Profile: \`${profile}\`
                  - Target: \`${host_target}\`
                  - Binary: \`zeroclaw\`
                  - SHA256: \`${sha}\`
                  EOF
                  else
                    fail_on_drift="false"
                    allow_build_id_drift="true"
                    if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
                      fail_on_drift="true"
                    elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                      fail_on_drift="${{ github.event.inputs.fail_on_drift || 'true' }}"
                      allow_build_id_drift="${{ github.event.inputs.allow_build_id_drift || 'true' }}"
                    fi
                    FAIL_ON_DRIFT="$fail_on_drift" \
                    ALLOW_BUILD_ID_DRIFT="$allow_build_id_drift" \
                    OUTPUT_DIR="artifacts" \
                    ./scripts/ci/reproducible_build_check.sh
                  fi

            - name: Emit normalized audit event
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -f artifacts/reproducible-build.json ]; then
                    python3 scripts/ci/emit_audit_event.py \
                      --event-type reproducible_build \
                      --input-json artifacts/reproducible-build.json \
                      --output-json artifacts/audit-event-reproducible-build.json \
                      --artifact-name reproducible-build-audit-event \
                      --retention-days 14
                  fi

            - name: Upload reproducibility artifacts
              if: always()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: reproducible-build
                  path: artifacts/reproducible-build*
                  retention-days: 14

            - name: Upload audit event artifact
              if: always()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: reproducible-build-audit-event
                  path: artifacts/audit-event-reproducible-build.json
                  if-no-files-found: ignore
                  retention-days: 14

            - name: Publish summary
              if: always()
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -f artifacts/reproducible-build.md ]; then
                    cat artifacts/reproducible-build.md >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "Reproducible build report missing." >> "$GITHUB_STEP_SUMMARY"
                  fi

            - name: Generate workflow latency report
              if: always()
              continue-on-error: true
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p artifacts
                  gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" > artifacts/workflow-run.json
                  gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" > artifacts/workflow-jobs.json
                  gh run list -R "${GITHUB_REPOSITORY}" --workflow "CI Reproducible Build" --limit 40 \
                    --json databaseId,status,conclusion,createdAt,updatedAt,url,event,headBranch > artifacts/workflow-history.json
                  python3 scripts/ci/workflow_latency_report.py \
                    --workflow-name "CI Reproducible Build" \
                    --current-run-json artifacts/workflow-run.json \
                    --current-jobs-json artifacts/workflow-jobs.json \
                    --history-runs-json artifacts/workflow-history.json \
                    --step-name "Run reproducible build check" \
                    --output-json artifacts/workflow-latency.json \
                    --output-md artifacts/workflow-latency.md

            - name: Upload workflow latency artifact
              if: always()
              continue-on-error: true
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: reproducible-build-latency
                  path: artifacts/workflow-latency*
                  if-no-files-found: ignore
                  retention-days: 14

            - name: Publish latency summary
              if: always()
              continue-on-error: true
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -f artifacts/workflow-latency.md ]; then
                    cat artifacts/workflow-latency.md >> "$GITHUB_STEP_SUMMARY"
                  else
                    echo "Workflow latency summary missing." >> "$GITHUB_STEP_SUMMARY"
                  fi
