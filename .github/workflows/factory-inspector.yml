name: Factory Inspector

on:
  schedule:
    - cron: "45 10 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - comment-only
      checks:
        description: "Comma-separated checks"
        required: true
        default: "pr-intake,issue-intake"
      max_mutations:
        description: "Maximum PR comments in comment-only mode"
        required: true
        default: "25"

concurrency:
  group: factory-inspector
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  inspector:
    name: Factory Inspector
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run factory inspector
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event_name == 'schedule' && 'preview' || inputs.mode }}
          CHECKS: ${{ github.event_name == 'schedule' && 'pr-intake,issue-intake' || inputs.checks }}
          MAX_MUTATIONS: ${{ github.event_name == 'schedule' && '25' || inputs.max_mutations }}
        run: |
          python3 .claude/skills/factory-inspector/scripts/factory_inspector.py \
            --repo "$GITHUB_REPOSITORY" \
            --mode "$MODE" \
            --checks "$CHECKS" \
            --max-mutations "$MAX_MUTATIONS" \
            --summary-file artifacts/factory-inspector/summary.md

      - name: Add job summary
        run: cat artifacts/factory-inspector/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: factory-inspector-audit
          path: artifacts/factory-inspector/*.json
          if-no-files-found: error
