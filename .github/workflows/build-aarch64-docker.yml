name: Build aarch64 Release (Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.6.9)'
        required: true
        default: 'v0.6.9'

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04-arm  # ARM64 runner - 原生构建，更快更可靠
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: 1.88.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Build release binary
        run: |
          cargo build --release
          cp target/release/quantclaw quantclaw-aarch64-linux-gnu
          strip quantclaw-aarch64-linux-gnu
          file quantclaw-aarch64-linux-gnu

      - name: Create release package
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p quantclaw-${VERSION}-aarch64-linux-gnu
          cp quantclaw-aarch64-linux-gnu quantclaw-${VERSION}-aarch64-linux-gnu/quantclaw
          cp -r web/dist quantclaw-${VERSION}-aarch64-linux-gnu/
          cp README.md quantclaw-${VERSION}-aarch64-linux-gnu/
          tar czf quantclaw-${VERSION}-aarch64-linux-gnu.tar.gz quantclaw-${VERSION}-aarch64-linux-gnu
          ls -lh quantclaw-${VERSION}-aarch64-linux-gnu.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantclaw-aarch64-linux-gnu
          path: quantclaw-*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.event.inputs.version, 'v')
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: quantclaw-*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
