name: 检查并同步上游更新

on:
  schedule:
    # 东京时间凌晨 1:00 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      workflows: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检查上游是否有更新
        id: check
        run: |
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git
          git fetch upstream
          MERGE_BASE=$(git merge-base HEAD upstream/master)
          UPSTREAM=$(git rev-parse upstream/master)
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "无更新，跳过同步"
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "发现新版本，准备同步"
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: 检查上游是否有与我们 Action 同名的文件
        if: steps.check.outputs.has_update == 'true'
        run: |
          OUR_FILES=(
            ".github/workflows/sync-upstream.yml"
            ".github/workflows/build-browser-release.yml"
          )

          echo "🔍 检查上游是否存在与我们 Action 同名的文件..."

          for f in "${OUR_FILES[@]}"; do
            if git cat-file -e "upstream/master:$f" 2>/dev/null; then
              echo "❌ 错误：上游存在同名文件 '$f'，停止同步以避免冲突！"
              exit 1
            fi
          done

          echo "✅ 上游没有同名文件，可以安全同步"

      - name: 同步并推送新代码
        if: steps.check.outputs.has_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/master --no-edit || {
            echo "❌ 合并冲突，中止同步"
            git merge --abort
            exit 1
          }
          git push origin master

      - name: 触发编译
        if: steps.check.outputs.has_update == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-browser-release.yml
