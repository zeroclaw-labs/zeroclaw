name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * 1'   # weekly on Mondays at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Merge upstream/master
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commits ahead"

      - name: Check for existing open sync PR
        if: steps.check.outputs.behind != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --state open --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("sync/upstream-"))] | first | .number // ""')
          echo "pr=$EXISTING" >> $GITHUB_OUTPUT
          if [ -n "$EXISTING" ]; then
            echo "Found existing open sync PR #$EXISTING"
          fi

      - name: Comment on existing sync PR
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          gh pr comment ${{ steps.existing.outputs.pr }} \
            --body "Weekly sync check: upstream is now **$BEHIND commits ahead** of master. Resolve this PR to catch up."
          echo "Commented on existing PR #${{ steps.existing.outputs.pr }} -- skipping new branch."

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.pr == ''
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          if git merge upstream/master --no-edit; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "conflicts=$CONFLICTS" >> $GITHUB_OUTPUT
            git merge --abort
          fi
          git push origin "$BRANCH" --force-with-lease
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Ensure sync label exists
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create sync --color 0075ca --description "Upstream sync PR" --force

      - name: Open clean sync PR
        if: steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          cat > /tmp/pr-body.md << 'BODY'
          Automated weekly sync from [zeroclaw-labs/zeroclaw](https://github.com/zeroclaw-labs/zeroclaw).

          **Before merging, verify fork-owned files still apply cleanly:**
          - [ ] `src/channels/discord.rs` - image marker emission in `process_attachments()`
          - [ ] `src/channels/mod.rs` - approval wiring (largest file, highest conflict risk)
          - [ ] `src/approval/mod.rs` - net-new file, verify it still compiles
          - [ ] `src/agent/history.rs` - `trim_tool_message_content` tool_call_id preservation
          - [ ] `src/providers/openrouter.rs` - `clean_for_gemini` schema cleaning

          **Also check:**
          - [ ] Breaking changes in `Cargo.toml` / config schema
          - [ ] Run `cargo check` in WSL after merge before triggering a CI build
          BODY
          gh pr create \
            --title "chore: sync $BEHIND upstream commit(s) $(date +%Y-%m-%d)" \
            --label sync \
            --head "${{ steps.merge.outputs.branch }}" \
            --base master \
            --body-file /tmp/pr-body.md

      - name: Open draft conflict PR
        if: steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          CONFLICTS="${{ steps.merge.outputs.conflicts }}"
          BRANCH="${{ steps.merge.outputs.branch }}"
          {
            echo "Automated weekly sync from [zeroclaw-labs/zeroclaw](https://github.com/zeroclaw-labs/zeroclaw)."
            echo ""
            echo "> **Merge conflict detected.** This is a draft PR. Resolve conflicts on the \`$BRANCH\` branch, then mark ready for review."
            echo ""
            echo "**Conflicted files:**"
            echo "$CONFLICTS" | tr ' ' '\n' | grep -v '^$' | sed 's/^/- /'
            echo ""
            echo "**Fork-owned files to verify after resolution:**"
            echo "- [ ] \`src/channels/discord.rs\` - image marker emission in \`process_attachments()\`"
            echo "- [ ] \`src/channels/mod.rs\` - approval wiring (largest file, highest conflict risk)"
            echo "- [ ] \`src/approval/mod.rs\` - net-new file, verify it still compiles"
            echo "- [ ] \`src/agent/history.rs\` - \`trim_tool_message_content\` tool_call_id preservation"
            echo "- [ ] \`src/providers/openrouter.rs\` - \`clean_for_gemini\` schema cleaning"
            echo ""
            echo "**Also check:**"
            echo "- [ ] Breaking changes in \`Cargo.toml\` / config schema"
            echo "- [ ] Run \`cargo check\` in WSL after merge before triggering a CI build"
          } > /tmp/pr-body.md
          gh pr create \
            --title "chore: sync $BEHIND upstream commit(s) $(date +%Y-%m-%d) [CONFLICT]" \
            --label sync \
            --draft \
            --head "$BRANCH" \
            --base master \
            --body-file /tmp/pr-body.md

      - name: No changes
        if: steps.check.outputs.behind == '0'
        run: echo "Already up to date with upstream."
