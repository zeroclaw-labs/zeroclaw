name: Build aarch64 with whatsapp-web
on:
  push:
    branches: [feat/whatsapp-voice-markers]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross
        run: cargo install cross --locked
      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu --features whatsapp-web
      - uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-whatsapp-web
          path: target/aarch64-unknown-linux-gnu/release/zeroclaw
