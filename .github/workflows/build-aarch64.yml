name: Build aarch64 Release for Raspberry Pi

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v0.6.9)'
        required: false
        default: ''

jobs:
  build-aarch64:
    # GitHub now provides ARM64 runners (Ubuntu 24.04 ARM64)
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            protobuf-compiler

      - name: Build frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Build aarch64 binary
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
          file target/aarch64-unknown-linux-gnu/release/quantclaw
          ls -lh target/aarch64-unknown-linux-gnu/release/quantclaw

      - name: Create release package
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          PKG_NAME="quantclaw-${VERSION}-aarch64-linux-gnu"
          mkdir -p "dist/${PKG_NAME}"
          
          # 复制二进制文件
          cp target/aarch64-unknown-linux-gnu/release/quantclaw "dist/${PKG_NAME}/quantclaw"
          
          # 复制前端资源
          cp -r web/dist "dist/${PKG_NAME}/"
          
          # 复制文档
          cp README.md LICENSE-MIT LICENSE-APACHE "dist/${PKG_NAME}/" 2>/dev/null || true
          
          # 创建安装脚本
          cat > "dist/${PKG_NAME}/install.sh" << 'EOF'
#!/bin/bash
set -e

echo "=== QuantClaw for Raspberry Pi (aarch64) ==="
echo ""

INSTALL_DIR="/usr/local/bin"
SERVICE_DIR="/etc/systemd/system"

# 检查架构
if [[ $(uname -m) != "aarch64" ]]; then
    echo "[!] 警告: 当前系统不是 aarch64 架构，检测到: $(uname -m)"
    read -p "是否继续安装? (y/N) " -n 1 -r
    echo
    [[ $REPLY =~ ^[Yy]$ ]] || exit 1
fi

# 检查权限
if [[ $EUID -ne 0 ]]; then
   echo "[!] 请使用 sudo 运行安装脚本"
   exit 1
fi

# 安装二进制文件
echo "[*] 安装 quantclaw 到 ${INSTALL_DIR}..."
cp quantclaw "${INSTALL_DIR}/"
chmod +x "${INSTALL_DIR}/quantclaw"

# 创建配置目录
echo "[*] 创建配置目录..."
mkdir -p /root/.quantclaw
mkdir -p /root/.quantclaw/workspace

# 创建默认配置
if [[ ! -f "/root/.quantclaw/config.toml" ]]; then
    echo "[*] 创建默认配置文件..."
    cat > "/root/.quantclaw/config.toml" << 'CONFIG'
api_key = ""
default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4-20250514"
default_temperature = 0.7

[autonomy]
level = "supervised"
workspace_only = true

[gateway]
port = 42617
host = "0.0.0.0"
web_dist_dir = "/usr/local/share/quantclaw/web/dist"

[observability]
backend = "none"
CONFIG
fi

# 安装 web 资源
if [[ -d "web/dist" ]]; then
    echo "[*] 安装 web 资源..."
    mkdir -p "/usr/local/share/quantclaw"
    cp -r web/dist "/usr/local/share/quantclaw/"
fi

echo ""
echo "=== 安装完成! ==="
echo ""
echo "使用方法:"
echo "    quantclaw --help              # 查看帮助"
echo "    quantclaw gateway             # 启动网关服务"
echo "    quantclaw daemon              # 启动守护进程"
echo ""
echo "配置位置: /root/.quantclaw/config.toml"
echo "网关地址: http://$(hostname -I | awk '{print $1}'):42617"
echo ""
echo "请先编辑配置文件设置 API 密钥:"
echo "    sudo nano /root/.quantclaw/config.toml"
echo ""
EOF
          chmod +x "dist/${PKG_NAME}/install.sh"
          
          # 创建卸载脚本
          cat > "dist/${PKG_NAME}/uninstall.sh" << 'EOF'
#!/bin/bash
set -e

if [[ $EUID -ne 0 ]]; then
   echo "[!] 请使用 sudo 运行"
   exit 1
fi

echo "[*] 卸载 QuantClaw..."
rm -f /usr/local/bin/quantclaw
rm -rf /usr/local/share/quantclaw
echo "[*] 配置文件保留在 /root/.quantclaw/"
echo "[*] 如需完全删除，请手动执行: rm -rf /root/.quantclaw"
echo "=== 卸载完成 ==="
EOF
          chmod +x "dist/${PKG_NAME}/uninstall.sh"
          
          # 创建 README
          cat > "dist/${PKG_NAME}/README.txt" << EOF
QuantClaw for Raspberry Pi (aarch64)
======================================

版本: ${VERSION}
架构: aarch64-linux-gnu
适用: Raspberry Pi 4/5, CM4, CM5 (64位系统)

安装要求:
- Raspberry Pi OS (64-bit) 或 Ubuntu Server 22.04+
- 至少 2GB RAM (建议 4GB)
- 2GB 可用存储空间

快速安装:
    sudo ./install.sh

完整安装步骤:
    1. 复制到树莓派
       scp quantclaw-*-aarch64-linux-gnu.tar.gz pi@raspberrypi.local:~/
    
    2. SSH 到树莓派
       ssh pi@raspberrypi.local
    
    3. 解压并安装
       tar xzf quantclaw-*-aarch64-linux-gnu.tar.gz
       cd quantclaw-*-aarch64-linux-gnu
       sudo ./install.sh
    
    4. 配置 API 密钥
       sudo nano /root/.quantclaw/config.toml
    
    5. 启动服务
       sudo quantclaw gateway

访问:
    网关界面: http://<树莓派IP>:42617

更多信息: https://github.com/quant-speed/quantclaw
EOF
          
          # 打包
          cd dist
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
          
          echo ""
          echo "=== 发布包已创建 ==="
          ls -lh "${PKG_NAME}.tar.gz"
          file "${PKG_NAME}/quantclaw"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantclaw-aarch64
          path: dist/*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
