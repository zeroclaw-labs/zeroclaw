name: Deploy mdBook docs to Pages

on:
  push:
    branches: [master, feat/fluent-i18n]
    paths:
      - "docs/book/**"
      - "src/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: v0.5.2
  CARGO_FLAGS: --no-default-features --features schema-export
  REF_DIR: docs/book/src/reference
  LOCALES: en ja

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mdBook (aarch64 musl, ~3MB)
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-aarch64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs-deploy
          cache-all-crates: true

      - name: Install json-schema-for-humans
        run: pipx install json-schema-for-humans

      - name: Install mdbook-i18n-helpers
        run: cargo install --locked mdbook-i18n-helpers

      - name: Generate reference pages from code
        run: |
          mkdir -p "$REF_DIR"
          cargo run $CARGO_FLAGS -- markdown-help    > "$REF_DIR/cli.md"
          cargo run $CARGO_FLAGS -- markdown-schema  > /tmp/config.schema.json
          generate-schema-doc --config template_name=md \
            /tmp/config.schema.json "$REF_DIR/config.md"

      - name: Generate API reference (rustdoc)
        run: cargo doc --no-deps --workspace --exclude zeroclaw-desktop

      - name: Build mdBook per locale
        working-directory: docs/book
        run: |
          for locale in $LOCALES; do
            MDBOOK_BOOK__LANGUAGE="$locale" mdbook build -d "book/$locale"
          done

      - name: Assemble Pages artifact (rustdoc + locale redirect)
        run: |
          cp -r target/doc docs/book/book/api
          cat > docs/book/book/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./en/">
          <link rel="canonical" href="./en/">
          <title>ZeroClaw Docs</title>
          HTML

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
