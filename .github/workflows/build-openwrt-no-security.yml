name: Build OpenWrt ARM64 - Safe Security Removal

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Safely remove security restrictions with Python
      run: |
        python3 << 'EOF'
        import re
        import os

        def patch_file(filepath, replacements):
            if not os.path.exists(filepath):
                print(f"Error: {filepath} not found!")
                return
            
            with open(filepath, 'r') as f:
                content = f.read()
            
            new_content = content
            for pattern, subst in replacements.items():
                # re.MULTILINE digunakan agar regex bisa bekerja dengan baik pada file besar
                new_content = re.sub(pattern, subst, new_content)
            
            if new_content != content:
                with open(filepath, 'w') as f:
                    f.write(new_content)
                print(f"Successfully patched: {filepath}")
            else:
                print(f"No changes made to: {filepath}. Check if patterns match.")

        # Patch untuk src/config/schema.rs
        # Menggunakan regex agar hanya mengganti nilai boolean/angka tanpa merusak kurung di akhir baris
        schema_changes = {
            r'(workspace_only:\s*)true': r'\1false',
            r'(block_high_risk_commands:\s*)true': r'\1false',
            r'(require_approval_for_medium_risk:\s*)true': r'\1false',
            r'(max_actions_per_hour:\s*)\d+': r'\1 999999',
            r'(max_cost_per_day_cents:\s*)\d+': r'\1 99999999',
            r'(level:\s*)AutonomyLevel::Supervised': r'\1AutonomyLevel::Full'
        }
        
        # Patch untuk src/onboard/wizard.rs
        wizard_changes = {
            r'autonomy_config_for_mode\(SecurityMode::Casual\)': 'autonomy_config_for_mode(SecurityMode::Freedom)',
            r'\.default\(0\)': '.default(2)'
        }

        patch_file('src/config/schema.rs', schema_changes)
        patch_file('src/onboard/wizard.rs', wizard_changes)
        EOF
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-musl
    
    - name: Install cross
      run: |
        # Mengunduh binary langsung jauh lebih cepat daripada 'cargo install'
        LATEST=$(curl -s https://api.github.com/repos/cross-rs/cross/releases/latest | grep tag_name | cut -d '"' -f 4)
        curl -L "https://github.com/cross-rs/cross/releases/download/$LATEST/cross-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin
    
    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-aarch64-
    
    - name: Build (Release)
      run: cross build --release --target aarch64-unknown-linux-musl
    
    - name: Package Artifacts
      run: |
        mkdir -p dist
        # Copy binary hasil build ke folder dist
        if [ -f target/aarch64-unknown-linux-musl/release/zeroclaw ]; then
          cp target/aarch64-unknown-linux-musl/release/zeroclaw dist/zeroclaw-openwrt-aarch64
          tar -czf dist/zeroclaw-openwrt-aarch64.tar.gz -C dist zeroclaw-openwrt-aarch64
        else
          echo "Binary not found! Build might have failed."
          exit 1
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-openwrt-aarch64
        path: dist/zeroclaw-openwrt-aarch64.tar.gz
