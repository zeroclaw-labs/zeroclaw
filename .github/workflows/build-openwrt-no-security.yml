name: Build OpenWrt ARM64 - Safe Security Removal

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Safely remove security restrictions with Python
      run: |
        python3 << 'EOF'
        import re
        
        # Fix schema.rs - only change default values, not structure
        with open('src/config/schema.rs', 'r') as f:
            lines = f.readlines()
        
        new_lines = []
        for line in lines:
            # Only change simple boolean/number defaults
            if 'workspace_only: true,' in line and 'autonomy' not in line.lower():
                line = line.replace('workspace_only: true,', 'workspace_only: false,')
            elif 'block_high_risk_commands: true,' in line:
                line = line.replace('block_high_risk_commands: true,', 'block_high_risk_commands: false,')
            elif 'require_approval_for_medium_risk: true,' in line:
                line = line.replace('require_approval_for_medium_risk: true,', 'require_approval_for_medium_risk: false,')
            elif 'max_actions_per_hour: 100,' in line:
                line = line.replace('max_actions_per_hour: 100,', 'max_actions_per_hour: 999999,')
            elif 'max_cost_per_day_cents: 500,' in line:
                line = line.replace('max_cost_per_day_cents: 500,', 'max_cost_per_day_cents: 99999999,')
            elif 'level: AutonomyLevel::Supervised,' in line:
                line = line.replace('level: AutonomyLevel::Supervised,', 'level: AutonomyLevel::Full,')
            new_lines.append(line)
        
        with open('src/config/schema.rs', 'w') as f:
            f.writelines(new_lines)
        
        print("schema.rs fixed")
        
        # Fix wizard.rs - only change mode selection
        with open('src/onboard/wizard.rs', 'r') as f:
            content = f.read()
        
        # Only replace the specific function call, not elsewhere
        content = content.replace(
            'autonomy_config_for_mode(SecurityMode::Casual)',
            'autonomy_config_for_mode(SecurityMode::Freedom)'
        )
        
        # Change default selection from 0 (Safety) to 2 (Freedom)
        content = content.replace('.default(0)', '.default(2)')
        
        with open('src/onboard/wizard.rs', 'w') as f:
            f.write(content)
        
        print("wizard.rs fixed")
        EOF
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-musl
    
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
    
    - name: Cache
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry ~/.cargo/git target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: cross build --release --target aarch64-unknown-linux-musl
    
    - name: Package
      run: |
        mkdir -p dist
        cp target/aarch64-unknown-linux-musl/release/zeroclaw dist/zeroclaw-openwrt-aarch64
        tar -czf dist/zeroclaw-openwrt-aarch64.tar.gz -C dist zeroclaw-openwrt-aarch64
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-openwrt-aarch64
        path: dist/zeroclaw-openwrt-aarch64.tar.gz
