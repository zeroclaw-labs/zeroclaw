name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect vs. what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Set config key `x` to `y`
        2. Run `hrafn agent -m "..."`
        3. Observe error in logs
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Hrafn version
      description: Output of `hrafn --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "Ubuntu 24.04 aarch64 / macOS 15.2 arm64 / etc."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste error output or logs. Redact secrets and personal data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Config snippets, screenshots, related issues, etc.
    validations:
      required: false
