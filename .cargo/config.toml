[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-static"]

# ARM targets for Raspberry Pi and embedded Linux
[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# Android targets (NDK toolchain)
[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi21-clang"

[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"

# Build settings for low-memory systems
[build]
# Default to release-arm profile on ARM devices with limited RAM
# Users can override with: cargo build --profile release
# Uncomment the next line to make release-arm the default for all builds:
# target-dir = "target"
