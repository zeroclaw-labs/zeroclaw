# =============================================================================
# Workspace build behavior
# =============================================================================
# Disable incremental compilation. The `target/incremental/` directory is the
# #1 cause of target/ bloat (observed: ~31 GB out of 58 GB). Env vars take
# precedence over [profile.dev] in Cargo.toml, so this forces it off for every
# contributor without editing profile settings.
[env]
CARGO_INCREMENTAL = "0"

# Prefer the system `git` binary for registry/git dependency fetches. More
# reliable on flaky networks and behind corporate proxies than cargo's
# built-in libgit2.
[net]
git-fetch-with-cli = true

# =============================================================================
# Cross-compile targets
# =============================================================================

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "link-arg=-static", "-C", "link-arg=-Wl,-z,stack-size=8388608"]

# Windows targets
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-arg=-Wl,--stack,8388608"]

# Android targets (NDK toolchain)
[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi21-clang"

[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"
rustflags = ["-C", "link-arg=-Wl,-z,stack-size=8388608"]
