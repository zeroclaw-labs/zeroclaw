# ZeroClaw Docker Compose Example
#
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617
#
# For more info: https://github.com/zeroclaw-labs/zeroclaw

services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    # Or build locally:
    # build: .
    container_name: zeroclaw
    restart: unless-stopped

    environment:
      # Required: Your LLM provider API key
      - API_KEY=${API_KEY:-}
      # Or use the prefixed version:
      # - ZEROCLAW_API_KEY=${ZEROCLAW_API_KEY:-}

      # Optional: LLM provider (default: openrouter)
      # Options: openrouter, openai, anthropic, ollama
      - PROVIDER=${PROVIDER:-openrouter}

      # Allow public bind inside Docker (required for container networking)
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      # Default gateway port inside container
      - ZEROCLAW_GATEWAY_PORT=${ZEROCLAW_GATEWAY_PORT:-42617}

      # Optional: Model override
      # - ZEROCLAW_MODEL=anthropic/claude-sonnet-4-20250514

      # Multi-agent configuration
      - ZEROCLAW_AGENTS_DIR=/zeroclaw-data/agents
      - ZEROCLAW_TEAMS_DIR=/zeroclaw-data/teams

    volumes:
      # Persist workspace and config (must match WORKDIR/HOME in Dockerfile)
      - zeroclaw-data:/zeroclaw-data
      # Optional: Mount local agent definitions for development
      # - ./config/agents:/zeroclaw-data/agents:ro
      # - ./config/teams:/zeroclaw-data/teams:ro

    ports:
      # Gateway API port (override HOST_PORT if 42617 is taken)
      - "${HOST_PORT:-42617}:${ZEROCLAW_GATEWAY_PORT:-42617}"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Health check — uses lightweight status instead of full diagnostics.
    # For images with curl, prefer: curl -f http://localhost:42617/health
    healthcheck:
      test: ["CMD", "zeroclaw", "status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Multi-agent worker service (for distributed agent execution)
  zeroclaw-worker:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    container_name: zeroclaw-worker
    restart: unless-stopped
    profiles:
      - multi-agent
    environment:
      - API_KEY=${API_KEY:-}
      - PROVIDER=${PROVIDER:-openrouter}
      - ZEROCLAW_AGENT_MODE=worker
      - ZEROCLAW_COORDINATOR_ENDPOINT=http://zeroclaw:42617
      - ZEROCLAW_AGENTS_DIR=/zeroclaw-data/agents
    volumes:
      - zeroclaw-data:/zeroclaw-data
    depends_on:
      - zeroclaw
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  zeroclaw-data:
