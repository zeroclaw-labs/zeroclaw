apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-skills
  namespace: ai-agents
data:
  daily-meeting-summary.md: |
    ---
    name: daily-meeting-summary
    version: 2.2.0
    description: Fetches and summarizes daily meeting recordings from Speakr (meetings.coffee-anon.com)
    always: true
    ---

    # Daily Meeting Summary

    Speakr (https://meetings.coffee-anon.com) is Dan's self-hosted meeting transcription app.
    It records audio, transcribes with WhisperX, diarizes speakers, and generates LLM summaries.

    The cron job produces two assets each run:

    1. **Summary Aggregation** (`meetings-YYYY-MM-DD.md`) — a reference file built by a single
       Python script with zero LLM involvement. Contains meeting metadata, Speakr's pre-generated
       summaries, and transcript download URLs. This is the raw material.

    2. **Executive Summary** (`meetings-exec-YYYY-MM-DD.md`) — you read the aggregation and
       synthesize: action items for Dan, action items others owe Dan, and key decisions.
       This is the only step that needs your cognition.

    ## Environment Notes

    Your sandbox does not have `curl`. All HTTP requests use Python's `urllib` module.

    ## Tool Routing

    This skill uses your **native zeroclaw tools** exclusively:
    - `shell` — run Python scripts (for API calls, file generation)
    - `file_read` / `file_write` — read and write meeting files
    - `memory_store` / `memory_recall` — persist and retrieve meeting digests
    - `cron_list` / `cron_add` — manage the scheduled job
    - `content_search` — search within transcript files

    Your meeting data lives in your pod's local filesystem (`/data/workspace/memory/`)
    and SQLite memory store. Serena's memory is a separate system for code analysis —
    it has no access to your meeting files. Do not use Serena tools for any meeting task.

    ## Bootstrap — Cron Setup

    On first load, check if a `speakr-daily-summary` cron job exists via `cron_list`.
    If not, create it with `cron_add`:

    - **name**: `speakr-daily-summary`
    - **schedule**: cron `0 12,17 * * 1-5` (noon and 5pm PT, weekdays)
    - **timezone**: `America/Vancouver`
    - **job_type**: `agent`
    - **session_target**: `isolated`
    - **prompt**: Use the Cron Job Prompt below verbatim.

    ## Cron Job Prompt

    Use this as the `prompt` field when creating the cron job:

    ```
    You are running inside an isolated cron session. Execute the steps below directly
    using your tools. You are already inside the cron job — do not call cron_run, which
    would create an infinite loop of sessions re-dispatching this same job.

    Your job is to produce two files for today's meetings.

    STEP 1 — Build the Summary Aggregation (no LLM needed, one shell command).

    Run this Python script via the shell tool. It fetches the recording list, then
    fetches each recording individually (the list endpoint omits summaries), strips
    heavy fields, and writes the aggregation file directly to disk. Nothing is printed
    to stdout except a short status line, so this will never overflow your context:

      python3 << 'PYEOF'
      import json, os, urllib.request, datetime, pathlib

      BASE = 'https://meetings.coffee-anon.com'
      TOKEN = os.environ['SPEAKR_API_TOKEN']
      TODAY = datetime.date.today().isoformat()
      MEM = '/data/workspace/memory'
      OUT = f'{MEM}/meetings-{TODAY}.md'
      DROP = {'transcription','transcription_text','summary_html','notes_html',
              'audio_available','audio_deleted_at','can_delete','can_edit',
              'deletion_exempt','file_size','mime_type','original_filename',
              'processing_time_seconds','transcription_duration_seconds',
              'is_highlighted','is_inbox','is_owner','is_shared','has_group_tags',
              'user_id','completed_at','created_at'}

      def api(path):
          r = urllib.request.Request(f'{BASE}{path}',
              headers={'Authorization': f'Bearer {TOKEN}'})
          return json.loads(urllib.request.urlopen(r).read())

      # Check if an earlier run already wrote this file (noon vs 5pm)
      previous_titles = set()
      prev = pathlib.Path(OUT)
      if prev.exists():
          for line in prev.read_text().splitlines():
              if line.startswith('## '):
                  previous_titles.add(line[3:].strip())

      # Fetch list of today's recordings
      data = api(f'/api/recordings?q=date:today&per_page=100')
      recs = [r for r in data.get('recordings', []) if r.get('status') == 'COMPLETED']

      if not recs:
          with open(OUT, 'w') as f:
              f.write(f'# Meetings — {TODAY}\n\nNo completed meeting recordings for today.\n')
          print(f'No meetings today. Wrote {OUT}')
          raise SystemExit(0)

      ok = 0
      failed = 0
      pending_summaries = 0
      new_since_last = []

      with open(OUT, 'w') as f:
          f.write(f'# Meetings — {TODAY}\n\n')
          for i, rec_stub in enumerate(recs):
              rid = rec_stub['id']
              title = rec_stub.get('title', 'Untitled')
              try:
                  rec = api(f'/api/recordings/{rid}')
                  for k in DROP:
                      rec.pop(k, None)
              except Exception as e:
                  f.write(f'## {title}\n')
                  f.write(f'*Failed to fetch recording {rid}: {e}*\n\n---\n\n')
                  print(f'  [{i+1}/{len(recs)}] FAILED {title}: {e}')
                  failed += 1
                  continue

              title = rec.get('title', title)
              participants = rec.get('participants', 'Unknown')
              meeting_date = rec.get('meeting_date', '')
              time_str = meeting_date[11:16] if len(meeting_date) > 15 else meeting_date
              tags = ', '.join(t.get('name','') for t in rec.get('tags', []))
              summary = rec.get('summary', '')
              notes = rec.get('notes', '')
              events = rec.get('events', [])

              if title not in previous_titles and previous_titles:
                  new_since_last.append(title)

              f.write(f'## {title}\n')
              f.write(f'**Participants:** {participants}\n')
              f.write(f'**Time:** {time_str}\n')
              if tags:
                  f.write(f'**Tags:** {tags}\n')
              f.write(f'**Transcript:** {BASE}/recording/{rid}\n\n')

              if summary:
                  f.write(f'### Summary\n{summary}\n\n')
              else:
                  f.write('### Summary\n*Summary pending — recording may still be processing.*\n\n')
                  pending_summaries += 1

              if events:
                  f.write('### Action Items & Events\n')
                  for ev in events:
                      ev_title = ev.get('title', 'Untitled')
                      ev_date = ev.get('start_datetime', '')
                      ev_attendees = ', '.join(ev.get('attendees', []))
                      ev_desc = ev.get('description', '')
                      f.write(f'- **{ev_title}**')
                      if ev_attendees:
                          f.write(f' ({ev_attendees})')
                      if ev_date:
                          f.write(f' — {ev_date}')
                      if ev_desc:
                          f.write(f': {ev_desc}')
                      f.write('\n')
                  f.write('\n')

              if notes:
                  f.write(f'### Notes\n{notes}\n\n')

              f.write('---\n\n')
              ok += 1
              print(f'  [{i+1}/{len(recs)}] {title}')

      # Print summary for the agent to relay in Step 2
      parts = [f'Wrote {ok} meetings to {OUT}']
      if failed:
          parts.append(f'{failed} failed to fetch')
      if pending_summaries:
          parts.append(f'{pending_summaries} still processing (no summary yet)')
      if new_since_last:
          parts.append(f'New since last run: {", ".join(new_since_last)}')
      print('. '.join(parts))
      PYEOF

    STEP 2 — Build the Executive Summary.

    Read the file that Step 1 just wrote (meetings-YYYY-MM-DD.md) using `file_read`.
    Note the status line from Step 1 — it tells you if any recordings failed to
    fetch or are still processing (no summary yet).

    Then use `file_write` to create: /data/workspace/memory/meetings-exec-YYYY-MM-DD.md

    The executive summary should contain:

      # Executive Summary — YYYY-MM-DD

      **Meetings today:** N completed[, M still processing][, new since noon: ...]

      ## Action Items for Dan
      [Things Dan needs to do, extracted from summaries and events. Include context
       about which meeting it came from and any deadlines.]

      ## Action Items Others Owe Dan
      [Things other participants committed to doing for Dan or that Dan is waiting on.
       Include who, what, and when if mentioned.]

      ## Key Decisions & Issues
      [The most important decisions made and issues raised across all meetings today.
       Keep this to the top 3-5 items — what Dan would want to know if he only had
       30 seconds to scan this.]

    If any recordings have no summary yet, add a note at the bottom:
      > N recording(s) still processing — summaries not yet available.
      > Run again later or check meetings-YYYY-MM-DD.md for updates.

    If the script reported "New since last run: [titles]", call those out at the top
    so Dan knows what changed since the noon run.

    Keep it concise and actionable. Dan (Dan Jacobsen) is the primary reader.

    STEP 3 — Store a memory.

    Use `memory_store` with key "meetings_digest_YYYY-MM-DD" and category "daily".
    The value should include: the number of meetings, the file paths for both
    assets, and a one-sentence summary of the key theme. Example:
    "4 meetings on 2026-03-12. Files: meetings-2026-03-12.md (aggregation),
    meetings-exec-2026-03-12.md (exec summary). Focused on Q1 planning and
    the reporting infrastructure migration."
    ```

    ## On-Demand Usage

    When Dan asks about meetings (e.g., "what meetings did I have today?", "summarize my meetings",
    "any action items from this morning?"):

    1. **Quick check** — `memory_recall` key `meetings_digest_YYYY-MM-DD`. This is the cheapest
       lookup and tells you whether data exists, the file paths, and a one-line theme summary.
    2. **Read the exec summary** — `file_read` `/data/workspace/memory/meetings-exec-YYYY-MM-DD.md`.
       If it exists, use it to answer. This is the fast path.
    3. **Need more detail?** `file_read` `/data/workspace/memory/meetings-YYYY-MM-DD.md` for the
       full per-meeting summaries.
    4. **Nothing found?** Run the Step 1 Python script from the cron prompt above via `shell`,
       then read the output file and answer directly (skip writing an exec summary for ad-hoc).
    5. **Past dates**: Use `q=date:YYYY-MM-DD` in the API URL, or check existing files.

    ## API Quick Reference

    | Endpoint | Purpose |
    |----------|---------|
    | `GET /api/recordings?q=date:today&per_page=100` | Today's recordings |
    | `GET /api/recordings?q=date:yesterday` | Yesterday's recordings |
    | `GET /api/recordings?q=date:YYYY-MM-DD` | Specific date |
    | `GET /api/recordings?q=date:thisweek` | This week |
    | `GET /api/recordings?q=date_from:X&date_to:Y` | Date range |

    Base URL: `https://meetings.coffee-anon.com`

    ## Deep Dive — Chunked Full Transcription

    When Dan asks you to look at the full transcript of a specific recording (e.g., "what exactly
    did Sarah say about the timeline?", "pull up the full transcript of the 2pm meeting"),
    use this file-first pattern to avoid context overflow:

    **Step 1 — Download transcription to disk:**
    ```
    python3 << 'PYEOF'
    import json, os, urllib.request

    REC_ID = 'RECORDING_ID'  # Replace with actual recording ID
    BASE = 'https://meetings.coffee-anon.com'
    TOKEN = os.environ['SPEAKR_API_TOKEN']

    req = urllib.request.Request(f'{BASE}/api/recordings/{REC_ID}',
        headers={'Authorization': f'Bearer {TOKEN}'})
    r = json.loads(urllib.request.urlopen(req).read())
    t = r.get('transcription', [])

    out = f'# Transcript: {r.get("title", "Untitled")}\n'
    out += f'# Participants: {r.get("participants", "Unknown")}\n'
    out += f'# Date: {r.get("meeting_date", "Unknown")}\n'
    out += f'# Segments: {len(t) if isinstance(t, list) else "plain-text"}\n'
    if isinstance(t, list) and t:
        out += f'# Duration: {t[-1].get("end", "unknown")}s\n'
    out += '---\n'
    if isinstance(t, list):
        for seg in t:
            speaker = seg.get('speaker', '?')
            text = seg.get('text', seg.get('sentence', ''))
            start = seg.get('start', seg.get('start_time', 0))
            out += f'[{int(start//60):02d}:{int(start%60):02d}] {speaker}: {text}\n'
    else:
        out += str(t)

    path = f'/data/workspace/memory/transcript-{REC_ID}.md'
    with open(path, 'w') as f:
        f.write(out)
    print(f'Wrote {len(out):,} chars to {path}')
    print(f'Segments: {len(t) if isinstance(t, list) else "plain-text"}')
    PYEOF
    ```

    **Step 2 — Read in chunks using file_read with offset/limit:**
    - First read the header (first 10 lines) to get metadata
    - Then read ~200 lines at a time using offset/limit
    - Typical meetings have 200-2000 segments, ~1 line each

    **Step 3 — Clean up when done:**
    - Delete the transcript file after answering Dan's question
    - These files can be large (100K-1M+ chars) — don't leave them around

    **Example flow:**
    1. Dan: "What did Sarah say about the rollout timeline in the 2pm meeting?"
    2. You: fetch recording list (filtered) → find the 2pm recording ID
    3. You: download transcript to `transcript-549.md`
    4. You: read header → see it's 1,200 segments, 58 minutes
    5. You: search the file for "rollout" or "timeline" using content_search
    6. You: read the surrounding ~50 lines for context
    7. You: answer Dan's question
    8. You: delete `transcript-549.md`

    Never load a full transcript into a single shell command output or tool result.
    Always write to file first, then read chunks.
  k8s-delegation.md: |
    ---
    name: k8s-delegation
    version: 1.0.0
    description: Structures K8s infrastructure tasks for delegation to Walter via ACP. Use whenever Dan asks about deploying, managing, or debugging anything in the Kubernetes cluster — including the todolist namespace.
    always: false
    ---

    # K8s Task Delegation to Walter

    Walter is the K8s infrastructure agent. He has kubectl access, the scrapyard-applications
    repo, and Serena memories. He does NOT have access to your memory, conversation history,
    or any context you haven't explicitly included in the ACP message.

    ## When This Applies

    Any time you need something done in the Kubernetes cluster:
    - Deploy an application
    - Check pod/service/namespace status
    - Debug failing resources
    - Create or modify manifests
    - Manage storage, networking, certificates

    ## The One Rule

    **One work order = one deployable unit.**

    Don't send "deploy a todo list app" as a single message. Walter will lose track.
    Break it down. Each ACP message should produce one verifiable outcome.

    ## Work Order Template

    Structure every `acp-client send` message like this:

        TASK: [One sentence — what to do]
        NAMESPACE: [target namespace]

        CONTEXT:
        [Everything Walter needs to know. Include:
        - What exists already (namespace, other resources)
        - Repo location for manifests
        - Relevant patterns to follow]

        REQUIREMENTS:
        - [Specific requirement 1]
        - [Specific requirement 2]

        VERIFICATION:
        When done, report:
        - [What to check — e.g., "kubectl get pods -n todolist showing Running"]
        - [What to commit — e.g., "manifest committed to repo"]

        REPO PATH: 04_scrapyard_test_projects/<app_dir>/

    ## Breaking Down Deployments

    A typical app deployment breaks into these atomic steps (send each as a separate
    ACP work order, in order, after verifying the previous one succeeded):

    1. **Namespace** — Create namespace with istio labels
    2. **Secrets** — Create VaultStaticSecret CRDs (if app needs secrets)
    3. **Storage** — Create PVCs (if app needs persistent storage)
    4. **Database** — Deploy database (if app needs one — e.g., CNPG PostgreSQL)
    5. **Application** — Create Deployment + Service for the app
    6. **External access** — Walter creates Certificate, Gateway, VirtualService
       manifests and submits a PR (he can't apply these directly). Wait for Dan to
       merge before testing external access.
    7. **Verification** — Final check: all pods running, service resolving, external access working

    Skip steps that don't apply (e.g., skip secrets/database for a simple static app).

    ## Example: Deploying an app to the todolist namespace

    **Step 1 — Check what exists:**

        acp-client send "TASK: Report current state of the todolist namespace.

        CONTEXT:
        Check what resources currently exist in the todolist namespace.

        VERIFICATION:
        Report: namespaces, deployments, services, PVCs, pods, and their statuses."

    Wait for result with `acp-client wait <id> --timeout 600`. Then proceed based on what exists.

    **Step 2 — Create deployment:**

        acp-client send "TASK: Create a Deployment and Service for Vikunja in the todolist namespace.

        NAMESPACE: todolist

        CONTEXT:
        The todolist namespace already exists with istio ambient mode.
        Follow the plain-manifests pattern from the scrapyard-applications repo.
        Manifests go in: 04_scrapyard_test_projects/34_todolist/

        REQUIREMENTS:
        - Image: vikunja/vikunja:0.24.6 (pinned tag)
        - Port: 3456
        - Memory request 256Mi, limit 512Mi
        - CPU request 100m
        - Security context: runAsNonRoot, drop ALL capabilities
        - Readiness probe on port 3456
        - automountServiceAccountToken: false
        - Create a matching ClusterIP Service

        VERIFICATION:
        When done, report:
        - Exact pod name and status (kubectl get pods -n todolist)
        - Service endpoint (kubectl get svc -n todolist)
        - Manifests committed to scrapyard-applications repo with file paths

        REPO PATH: 04_scrapyard_test_projects/34_todolist/"

    ## After Each Work Order

    1. Use `acp-client wait <session_id> --timeout 600`
    2. Read Walter's response carefully
    3. Check for concrete evidence:
       - Resource names and statuses (not just "done")
       - Commit reference or file paths
       - Any errors or blockers flagged
    4. If something failed, send a follow-up with the error context
    5. If successful, proceed to the next step
    6. Clean up: `acp-client delete <session_id>`

    ## Monitoring Walter's Progress

    Don't blindly wait for Walter to finish. Use progress checks:

        # Check what Walter is doing (shows partial output)
        acp-client progress <session_id>

    If Walter has been working for more than 5 minutes with no progress, or if you
    see him going in the wrong direction, inject a course correction:

        # Send a mid-task message — Walter sees it on his next tool iteration
        acp-client inject <session_id> "CORRECTION: Use SQLite instead of Postgres for this deployment."

    Injected messages appear in Walter's context as [Mid-turn message from user].
    He will see them after his current tool call completes.

    ## Recommended Flow (replaces blind wait)

        # 1. Send the work order
        acp-client send "TASK: ..."
        # → PENDING acp_session_id=abc-123

        # 2. Wait with timeout — but check progress if it's taking long
        acp-client wait abc-123 --timeout 600

        # If wait times out or you need to redirect:
        acp-client progress abc-123
        acp-client inject abc-123 "Walter, prioritize getting the deployment running first. Skip external access for now."

        # 3. Get the final result
        acp-client result abc-123

        # 4. Cleanup
        acp-client delete abc-123

    ## Handling Walter's PRs

    Walter now has his own Gitea account and submits PRs for resources he can't
    apply directly (VirtualServices, Certificates, Gateways).

    When Walter's response includes a "PR SUBMITTED" section:
    1. **Note the PR number and URL**
    2. **Tell Dan** — "Walter deployed the core app but needs your review on
       PR #N for external access. Link: <url>"
    3. **Include what Dan needs to do after merging** — Walter will specify
       the `kubectl apply` commands
    4. **Don't send Walter follow-up tasks that depend on the PR'd resources**
       until Dan confirms the PR is merged

    ### Example notification to Dan:
    "Walter has the Vikunja deployment running (pods healthy, service up).
    For external access at vikunja.coffee-anon.com, he's submitted PR #42
    on Gitea: <url>. After you merge, apply the VirtualService and Certificate
    with: `kubectl apply -f 04_scrapyard_test_projects/34_todolist/05_certificate.yaml -f 04_scrapyard_test_projects/34_todolist/07_virtualservice.yaml`"

    ### Sending Walter PR Review Feedback

    When Dan reviews Walter's PR and requests changes:

    1. **Send Walter a review task:**

            acp-client send "TASK: Address review comments on PR #<number>.

            CONTEXT:
            Dan reviewed your PR and left feedback.
            Read the review comments with gitea-pr comments <number>.

            REQUIREMENTS:
            - Read all review comments
            - Make the requested changes on the PR branch
            - Push the update
            - Reply on the PR acknowledging the changes (gitea-pr reply)

            VERIFICATION:
            Report what changes you made and confirm the push + reply."

    2. Wait for result: `acp-client wait <session_id> --timeout 600`

    3. Tell Dan: "Walter has pushed updates to PR #N addressing your feedback."

    4. If Walter couldn't address something, flag it to Dan with context.

    ## What NOT to Do

    - Don't send multi-step deployment plans as a single message
    - Don't reference "the plan" or "what we discussed" — Walter has no context
    - Don't skip verification between steps — errors compound
    - Don't assume Walter remembers previous sessions (check his response)
    - Don't let Walter run for 20+ minutes without checking progress
    - Don't send Walter to address review comments without including the PR number
  vikunja-project-manager.md: |
    ---
    name: vikunja-project-manager
    version: 1.0.0
    description: Manage project status and tasks via the Vikunja CLI. Use whenever Dan asks about project status, task tracking, TODO lists, or wants to communicate progress on work items. Also use proactively when completing work that should be tracked.
    ---

    # Vikunja Project Manager

    You have a `vikunja` CLI tool that manages projects and tasks on the
    team's Vikunja instance (todolist.coffee-anon.com). Use it to track
    work status, create actionable task lists, and report progress.

    The tool is already on your PATH and authenticated — just run it
    directly via your shell tool (e.g., `vikunja projects`). Do not
    check for tokens or try alternative approaches. If it fails, report
    the error output.

    ## When to use this

    - Dan asks about project status or what's being worked on
    - You complete a piece of work and want to record it
    - Dan asks you to create a task list or project plan
    - You need to check what's outstanding before starting work

    ## Commands

    ```
    vikunja projects                        # List all projects
    vikunja project create --title "..."    # Create a new project
    vikunja tasks <project-id>              # List tasks in a project
    vikunja task create <project-id> --title "..." [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]
    vikunja task update <task-id> [--done] [--title "..."] [--assignee <username>]
    vikunja task assign <task-id> --user <username>
    vikunja task comment <task-id> --body "..."
    ```

    ## Users

    Known usernames: `dan`, `sam`, `admin`. Use these with `--assignee`
    when creating tasks or `--user` when assigning. Tasks show assignees
    as `@username` in the listing. Assign Dan to tasks that are his
    action items; assign yourself to tasks you're tracking.

    ## Workflow

    **Starting a new initiative:**
    1. `vikunja projects` — check if a project already exists before creating one
    2. `vikunja project create --title "Initiative Name"` (only if needed)
    2. Break work into tasks with priorities and due dates
    3. Report the project ID and task list to Dan

    **Updating progress:**
    1. `vikunja tasks <project-id>` to see current state
    2. `vikunja task update <id> --done` when work completes
    3. `vikunja task comment <id> --body "context"` for decisions or blockers

    **Reporting status:**
    1. `vikunja tasks <project-id>` for the full list
    2. Summarize: done, in progress, blocked

    ## Tips

    - Priority 1 (lowest) through 5 (highest) for urgency
    - Due dates for time-sensitive work: `--due "2026-03-20"`
    - Task titles should be short and actionable
    - The default task list view filters out completed tasks
