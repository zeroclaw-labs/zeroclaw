apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
  namespace: ai-agents
data:
  config.toml: |
      # Secrets are injected via environment variables (highest priority):
      #   API_KEY                          — LiteLLM proxy API key
      #   ZEROCLAW_GATEWAY_PAIRED_TOKENS   — comma-separated gateway auth tokens
      default_provider = "custom:https://assistant-api.coffee-anon.com/v1"
      default_model = "litellm-local-default-vision"
      default_temperature = 0.9
      model_support_vision = true
      strip_prior_reasoning = true
      context_window_tokens = 131072

      [autonomy]
      level = "full"
      workspace_only = false
      allowed_commands = ["*"]
      forbidden_paths = [
          "/etc",
          "/root",
          "/home",
          "/usr",
          "/bin",
          "/sbin",
          "/lib",
          "/opt",
          "/boot",
          "/dev",
          "/proc",
          "/sys",
          "/var",
          "/tmp",
          "~/.ssh",
          "~/.gnupg",
          "~/.aws",
          "~/.config",
      ]
      max_actions_per_hour = 9999
      max_cost_per_day_cents = 500
      require_approval_for_medium_risk = false
      block_high_risk_commands = false
      non_cli_excluded_tools = []
      non_cli_natural_language_approval_mode = "direct"
      shell_env_passthrough = ["ACP_AUTH_TOKEN", "ACP_BASE_URL", "ACP_CWD"]

      [research]
      trigger = "never"

      [reliability]
      provider_retries = 5

      [agent]
      max_tool_iterations = 999
      loop_detection_no_progress_threshold = 15
      loop_detection_failure_streak = 10

      [heartbeat]
      enabled = true
      interval_minutes = 30

      [proactive_messaging]
      enabled = true

      [[proactive_messaging.quiet_hours]]
      start_hour = 22
      end_hour = 7
      timezone = "America/Edmonton"

      [goal_loop]
      enabled = true
      interval_minutes = 10
      step_timeout_secs = 120
      max_steps_per_cycle = 3

      [channels_config]
      cli = true
      message_timeout_secs = 300

      [channels_config.signal]
      http_url = "http://127.0.0.1:8686"
      account = "+15873986009"
      allowed_from = ["*"]
      ignore_attachments = false
      ignore_stories = true
      edit_messages = true

      [memory]
      backend = "sqlite"
      auto_save = true
      embedding_provider = "none"

      [gateway]
      port = 3000
      host = "0.0.0.0"
      require_pairing = true
      allow_public_bind = true

      [gateway.node_control]
      enabled = true

      [composio]
      enabled = true

      [secrets]
      encrypt = false

      [browser]
      enabled = true
      backend = "agent_browser"
      allowed_domains = ["*"]

      [identity]
      format = "openclaw"

      [cost]
      enabled = true

      [cost.prices."anthropic/claude-opus-4-20250514"]
      input = 15.0
      output = 75.0

      [cost.prices."anthropic/claude-3.5-sonnet"]
      input = 3.0
      output = 15.0

      [cost.prices."anthropic/claude-3-haiku"]
      input = 0.25
      output = 1.25

      [cost.prices."openai/gpt-4o-mini"]
      input = 0.15
      output = 0.6

      [cost.prices."anthropic/claude-sonnet-4-20250514"]
      input = 3.0
      output = 15.0

      [cost.prices."openai/o1-preview"]
      input = 15.0
      output = 60.0

      [cost.prices."google/gemini-1.5-pro"]
      input = 1.25
      output = 5.0

      [cost.prices."google/gemini-2.0-flash"]
      input = 0.1
      output = 0.4

      [cost.prices."openai/gpt-4o"]
      input = 5.0
      output = 15.0

      [coordination]
      enabled = true

      [transcription]
      enabled = true
      api_url = "https://api.groq.com/openai/v1/audio/transcriptions"
      model = "whisper-large-v3-turbo"

      [agents_ipc]
      enabled = true

      [mcp]
      enabled = true

      [[mcp.servers]]
      name = "serena"
      transport = "http"
      url = "http://127.0.0.1:9121/mcp"
      tool_timeout_secs = 60
