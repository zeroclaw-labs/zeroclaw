apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: signal-cli-daemon-allow-from-zeroclaw
  namespace: zeroclaw-test
spec:
  podSelector:
    matchLabels:
      app: signal-cli-daemon
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zeroclaw-test

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeroclaw-allow-to-signal-cli-daemon
  namespace: zeroclaw-test
spec:
  podSelector:
    matchLabels:
      app: zeroclaw
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: signal-cli-daemon
