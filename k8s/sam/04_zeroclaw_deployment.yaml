# trunk-ignore(checkov/CKV_K8S_8): zeroclaw gateway does not document a dedicated liveness endpoint
# trunk-ignore(checkov/CKV_K8S_9): zeroclaw gateway does not document a dedicated readiness endpoint
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  namespace: zeroclaw-test
  labels:
    app: zeroclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zeroclaw
  template:
    metadata:
      labels:
        app: zeroclaw
    spec:
      serviceAccountName: zeroclaw-sa
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: build-zeroclaw
          image: rust:1.91.0-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              EXPECTED_BUILD_FEATURES=""
              mkdir -p /opt/zeroclaw
              if [ -x /opt/zeroclaw/zeroclaw ] && [ -f /opt/zeroclaw/.build_features ] && grep -qx "${EXPECTED_BUILD_FEATURES}" /opt/zeroclaw/.build_features; then
                echo "Using cached zeroclaw binary from PVC"
                chown 1000:1000 /opt/zeroclaw/zeroclaw
                exit 0
              fi
              echo "Building zeroclaw (no extra features)"
              apt-get update
              apt-get install -y --no-install-recommends git pkg-config libssl-dev perl make g++
              rm -rf /var/lib/apt/lists/*
              git clone --depth=1 https://github.com/zeroclaw-labs/zeroclaw.git /tmp/zeroclaw
              cd /tmp/zeroclaw
              cargo build --release --locked
              cp target/release/zeroclaw /opt/zeroclaw/zeroclaw
              printf "%s\n" "${EXPECTED_BUILD_FEATURES}" > /opt/zeroclaw/.build_features
              chmod 0755 /opt/zeroclaw/zeroclaw
              chown 1000:1000 /opt/zeroclaw/zeroclaw /opt/zeroclaw/.build_features
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /opt/zeroclaw
        - name: init-zeroclaw-config
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              TEMPLATE=/etc/zeroclaw-template/config.toml
              mkdir -p /config
              if [ ! -f /config/config.toml ]; then
                echo "Initializing zeroclaw config from template"
                cp "${TEMPLATE}" /config/config.toml
              fi
              # One-time migration: route Signal traffic through local sidecar adapter.
              if grep -q 'signal-cli-daemon\.zeroclaw-test\.svc\.cluster\.local:8686' /config/config.toml || grep -q 'signal-bridge\.zeroclaw-test\.svc\.cluster\.local:8686' /config/config.toml; then
                echo "Migrating signal channel URL to local signal-api-adapter"
                sed -i 's#signal-cli-daemon\.zeroclaw-test\.svc\.cluster\.local:8686#127.0.0.1:8686#g' /config/config.toml
                sed -i 's#signal-bridge\.zeroclaw-test\.svc\.cluster\.local:8686#127.0.0.1:8686#g' /config/config.toml
              fi
              # Keep Signal policy aligned with deployment baseline.
              sed -i '/^group_id = /d' /config/config.toml
              sed -i 's#^allowed_from = .*#allowed_from = ["*"]#' /config/config.toml
              sed -i 's#^default_model = .*#default_model = "litellm-local-default"#' /config/config.toml
              # Ensure message processing timeout is generous enough for slow LLM backends.
              grep -q '^message_timeout_secs' /config/config.toml \
                && sed -i 's#^message_timeout_secs = .*#message_timeout_secs = 120#' /config/config.toml \
                || sed -i '/^\[channels_config\]/a message_timeout_secs = 120' /config/config.toml
              chmod 600 /config/config.toml
              chown 1000:1000 /config/config.toml
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: zeroclaw-config
              mountPath: /config
            - name: zeroclaw-config-template
              mountPath: /etc/zeroclaw-template/config.toml
              subPath: config.toml
              readOnly: true
        - name: install-sam-tools
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              TOOLS_DIR=/opt/sam-tools
              NODE_VERSION="20.18.1"
              MARKER="${TOOLS_DIR}/.installed"
              if [ -f "${MARKER}" ] && grep -qx "${NODE_VERSION}" "${MARKER}"; then
                echo "sam-tools already at ${NODE_VERSION}, skipping"
                exit 0
              fi
              echo "Installing sam-tools (node ${NODE_VERSION})..."
              rm -rf "${TOOLS_DIR}/node" "${TOOLS_DIR}/npm-global" \
                     "${TOOLS_DIR}/playwright-browsers" "${TOOLS_DIR}/syslibs" \
                     "${TOOLS_DIR}/home"
              mkdir -p "${TOOLS_DIR}/home/.serena" "${TOOLS_DIR}/npm-global" \
                       "${TOOLS_DIR}/playwright-browsers" "${TOOLS_DIR}/syslibs"
              # The namespace egress policy only permits TCP/443; switch apt to HTTPS
              # before the first update so all package fetches use the allowed port.
              sed -i \
                's|http://deb.debian.org|https://deb.debian.org|g;
                 s|http://security.debian.org|https://security.debian.org|g' \
                /etc/apt/sources.list
              # Bootstrap: ca-certificates are absent in the slim base image so
              # peer verification must be disabled for the first two apt calls only.
              apt-get -o Acquire::https::Verify-Peer=false update -qq
              apt-get -o Acquire::https::Verify-Peer=false install -y \
                --no-install-recommends ca-certificates
              # From here on TLS is fully verified.
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                curl xz-utils git dpkg
              # Node.js from official tarball (pinned version, update MARKER to reinstall)
              curl -fsSL \
                "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
                | tar -xJ -C "${TOOLS_DIR}/"
              mv "${TOOLS_DIR}/node-v${NODE_VERSION}-linux-x64" "${TOOLS_DIR}/node"
              export PATH="${TOOLS_DIR}/node/bin:${PATH}"
              npm config set prefix "${TOOLS_DIR}/npm-global"
              export PATH="${TOOLS_DIR}/npm-global/bin:${PATH}"
              # Context7 MCP
              npm install -g @upstash/context7-mcp
              # Playwright MCP + Chromium browser binary
              npm install -g @playwright/mcp
              PLAYWRIGHT_BROWSERS_PATH="${TOOLS_DIR}/playwright-browsers" \
                npx playwright install chromium
              # Extract Chromium system library dependencies to the PVC so the
              # runtime container can find them via LD_LIBRARY_PATH without
              # needing a privileged apt-get at pod startup.
              apt-get install -y --no-install-recommends \
                libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 \
                libcairo2 libcups2 libdrm2 libgbm1 libglib2.0-0 libgtk-3-0 \
                libnspr4 libnss3 libpango-1.0-0 libwayland-client0 \
                libx11-6 libx11-xcb1 libxcb1 libxcb-shm0 libxcomposite1 \
                libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 \
                libxshmfence1 fonts-liberation
              mkdir -p /tmp/deb-pkgs && cd /tmp/deb-pkgs
              apt-get download \
                libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 \
                libcairo2 libcups2 libdrm2 libgbm1 libglib2.0-0 libgtk-3-0 \
                libnspr4 libnss3 libpango-1.0-0 libwayland-client0 \
                libx11-6 libx11-xcb1 libxcb1 libxcb-shm0 libxcomposite1 \
                libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 \
                libxshmfence1 fonts-liberation 2>/dev/null || true
              for deb in *.deb; do
                [ -f "${deb}" ] && dpkg-deb -x "${deb}" "${TOOLS_DIR}/syslibs/" || true
              done
              cd / && rm -rf /tmp/deb-pkgs
              # uv (Python package manager, required for Serena)
              export HOME="${TOOLS_DIR}/home"
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="${TOOLS_DIR}/home/.local/bin:${PATH}"
              # Pre-cache Serena uvx environment so the sidecar starts fast
              uvx --from git+https://github.com/oraios/serena \
                serena --version 2>/dev/null || true
              # Minimal Serena config for headless operation
              printf '%s\n' \
                'language_backend: LSP' \
                'gui_log_window: false' \
                'web_dashboard: false' \
                'web_dashboard_open_on_launch: false' \
                'default_modes:' \
                '  - interactive' \
                '  - editing' \
                > "${TOOLS_DIR}/home/.serena/serena_config.yml"
              chown -R 1000:1000 "${TOOLS_DIR}/"
              printf '%s\n' "${NODE_VERSION}" > "${MARKER}"
              echo "sam-tools installation complete"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: sam-tools
              mountPath: /opt/sam-tools
      containers:
        - name: zeroclaw
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/.zeroclaw /data/workspace
              exec /opt/zeroclaw/zeroclaw daemon
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /data
            - name: PATH
              value: /opt/sam-tools/node/bin:/opt/sam-tools/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: NPM_CONFIG_PREFIX
              value: /opt/sam-tools/npm-global
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /opt/sam-tools/playwright-browsers
            - name: LD_LIBRARY_PATH
              value: /opt/sam-tools/syslibs/usr/lib/x86_64-linux-gnu:/opt/sam-tools/syslibs/usr/lib:/opt/sam-tools/syslibs/lib/x86_64-linux-gnu:/opt/sam-tools/syslibs/lib
            - name: SERENA_SESSION_FILE
              value: /data/.zeroclaw/serena-session-id
            - name: SERENA_DEFAULT_PROJECT
              value: sam
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-secrets
                  key: openrouter-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-secrets
                  key: anthropic-api-key
                  optional: true
          securityContext:
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /opt/zeroclaw
              readOnly: true
            - name: zeroclaw-data
              mountPath: /data
            - name: zeroclaw-config
              mountPath: /data/.zeroclaw
            - name: sam-tools
              mountPath: /opt/sam-tools
              readOnly: true
        - name: serena
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/workspace
              exec /opt/sam-tools/home/.local/bin/uvx \
                --from git+https://github.com/oraios/serena \
                serena start-mcp-server \
                --transport streamable-http \
                --port 9121 \
                --enable-web-dashboard false \
                --enable-gui-log-window false \
                --project /data/workspace
          ports:
            - name: serena-mcp
              containerPort: 9121
              protocol: TCP
          env:
            - name: HOME
              value: /opt/sam-tools/home
            - name: PATH
              value: /opt/sam-tools/node/bin:/opt/sam-tools/npm-global/bin:/opt/sam-tools/home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: UV_TOOL_DIR
              value: /opt/sam-tools/home/.local/share/uv/tools
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: sam-tools
              mountPath: /opt/sam-tools
            - name: zeroclaw-data
              mountPath: /data
        - name: signal-api-adapter
          image: ttl.sh/signal-api-adapter-zeroclaw:24h
          imagePullPolicy: Always
          ports:
            - name: signal-adapt
              containerPort: 8686
              protocol: TCP
          env:
            - name: BRIDGE_BASE_URL
              value: http://signal-cli-daemon.zeroclaw-test.svc.cluster.local:8686
            - name: LISTEN_ADDR
              value: :8686
            - name: POLL_TIMEOUT_SECONDS
              value: "20"
            - name: SIGNAL_ACCOUNT
              value: "+15873986009"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: zeroclaw-data
          persistentVolumeClaim:
            claimName: zeroclaw-data
        - name: zeroclaw-config
          persistentVolumeClaim:
            claimName: zeroclaw-config
        - name: sam-tools
          persistentVolumeClaim:
            claimName: zeroclaw-sam-tools
        - name: zeroclaw-config-template
          configMap:
            name: zeroclaw-config
