# trunk-ignore(checkov/CKV_K8S_8): zeroclaw gateway does not document a dedicated liveness endpoint
# trunk-ignore(checkov/CKV_K8S_9): zeroclaw gateway does not document a dedicated readiness endpoint
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  namespace: zeroclaw-test
  labels:
    app: zeroclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zeroclaw
  template:
    metadata:
      labels:
        app: zeroclaw
    spec:
      serviceAccountName: zeroclaw-sa
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
      initContainers:
        - name: build-zeroclaw
          image: rust:1.91.0-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              EXPECTED_BUILD_FEATURES="2026-02-27"
              mkdir -p /opt/zeroclaw
              if [ -x /opt/zeroclaw/zeroclaw ] && [ -f /opt/zeroclaw/.build_features ] && grep -qx "${EXPECTED_BUILD_FEATURES}" /opt/zeroclaw/.build_features; then
                echo "Using cached zeroclaw binary from PVC"
                chown 1000:1000 /opt/zeroclaw/zeroclaw
                exit 0
              fi
              echo "Building zeroclaw (no extra features)"
              sed -i \
                's|http://deb.debian.org|https://deb.debian.org|g;
                 s|http://security.debian.org|https://security.debian.org|g' \
                /etc/apt/sources.list.d/debian.sources /etc/apt/sources.list 2>/dev/null || true
              apt-get -o Acquire::https::Verify-Peer=false update -qq
              apt-get -o Acquire::https::Verify-Peer=false install -y --no-install-recommends ca-certificates
              apt-get update
              apt-get install -y --no-install-recommends git pkg-config libssl-dev perl make g++
              rm -rf /var/lib/apt/lists/*
              git clone --depth=1 https://github.com/zeroclaw-labs/zeroclaw.git /tmp/zeroclaw
              cd /tmp/zeroclaw
              cargo build --release --locked
              cp target/release/zeroclaw /opt/zeroclaw/zeroclaw
              printf "%s\n" "${EXPECTED_BUILD_FEATURES}" > /opt/zeroclaw/.build_features
              chmod 0755 /opt/zeroclaw/zeroclaw
              chown 1000:1000 /opt/zeroclaw/zeroclaw /opt/zeroclaw/.build_features
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /opt/zeroclaw
        - name: init-zeroclaw-config
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              TEMPLATE=/etc/zeroclaw-template/config.toml
              mkdir -p /config
              if [ ! -f /config/config.toml ]; then
                echo "Initializing zeroclaw config from template"
                cp "${TEMPLATE}" /config/config.toml
              fi
              # One-time migration: route Signal traffic through local sidecar adapter.
              if grep -q 'signal-cli-daemon\.zeroclaw-test\.svc\.cluster\.local:8686' /config/config.toml || grep -q 'signal-bridge\.zeroclaw-test\.svc\.cluster\.local:8686' /config/config.toml; then
                echo "Migrating signal channel URL to local signal-api-adapter"
                sed -i 's#signal-cli-daemon\.zeroclaw-test\.svc\.cluster\.local:8686#127.0.0.1:8686#g' /config/config.toml
                sed -i 's#signal-bridge\.zeroclaw-test\.svc\.cluster\.local:8686#127.0.0.1:8686#g' /config/config.toml
              fi
              # Keep Signal policy aligned with deployment baseline.
              sed -i '/^group_id = /d' /config/config.toml
              sed -i 's#^allowed_from = .*#allowed_from = ["*"]#' /config/config.toml
              sed -i 's#^default_model = .*#default_model = "litellm-local-default"#' /config/config.toml
              # Ensure message processing timeout is generous enough for slow LLM backends.
              grep -q '^message_timeout_secs' /config/config.toml \
                && sed -i 's#^message_timeout_secs = .*#message_timeout_secs = 120#' /config/config.toml \
                || sed -i '/^\[channels_config\]/a message_timeout_secs = 120' /config/config.toml
              chmod 600 /config/config.toml
              chown 1000:1000 /config/config.toml
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: zeroclaw-config
              mountPath: /config
            - name: zeroclaw-config-template
              mountPath: /etc/zeroclaw-template/config.toml
              subPath: config.toml
              readOnly: true
        - name: install-sam-tools
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              TOOLS_DIR=/opt/sam-tools
              NODE_VERSION="20.18.1"
              INSTALL_STAMP="${NODE_VERSION}-serena-agent-browser-no-playwright-2026-02-28"
              MARKER="${TOOLS_DIR}/.installed"
              export HOME="${TOOLS_DIR}/home"
              export PATH="${TOOLS_DIR}/node/bin:${TOOLS_DIR}/npm-global/bin:${TOOLS_DIR}/home/.local/bin:${PATH}"

              # Per-component presence checks (queries the persistent PVC).
              # Called from 'if' conditions so set -e is suspended inside them.
              _node_ok() {
                [ -x "${TOOLS_DIR}/node/bin/node" ] && \
                [ "$(${TOOLS_DIR}/node/bin/node -v 2>/dev/null)" = "v${NODE_VERSION}" ]
              }
              _npm_ok() {
                [ -x "${TOOLS_DIR}/npm-global/bin/context7-mcp" ] && \
                [ -x "${TOOLS_DIR}/npm-global/bin/agent-browser" ]
              }
              _uv_ok()      { [ -x "${TOOLS_DIR}/home/.local/bin/uv" ]; }
              _serena_ok()  { [ -x "${TOOLS_DIR}/home/.local/bin/serena" ]; }

              # Always refresh Serena config on every start (cheap NFS write, ensures
              # config stays current even when the fast path skips heavy installation).
              mkdir -p "${TOOLS_DIR}/home/.serena"
              printf '%s\n' \
                'language_backend: LSP' \
                'gui_log_window: false' \
                'web_dashboard: false' \
                'web_dashboard_open_on_launch: false' \
                'default_modes:' \
                '  - interactive' \
                '  - editing' \
                'projects:' \
                '  sam:' \
                '    path: /data/workspace' \
                > "${TOOLS_DIR}/home/.serena/serena_config.yml"
              chown 1000:1000 "${TOOLS_DIR}/home/.serena/serena_config.yml" 2>/dev/null || true

              # Always refresh serena-cli on every start so updates take effect without
              # requiring a stamp bump. Sourced from the zeroclaw-serena-cli ConfigMap.
              cp /etc/zeroclaw-scripts/serena-cli "${TOOLS_DIR}/npm-global/bin/serena-cli"
              chmod +x "${TOOLS_DIR}/npm-global/bin/serena-cli"

              # Cleanup legacy Playwright MCP/bootstrap artifacts that conflict
              # with zeroclaw's internal agent-browser lifecycle.
              # Keep browser cache under /data/.cache/ms-playwright so installs
              # persist across pod restarts.
              if [ -x "${TOOLS_DIR}/npm-global/bin/playwright-mcp" ] \
                 || [ -d "${TOOLS_DIR}/npm-global/lib/node_modules/@playwright" ] \
                 || [ -d "${TOOLS_DIR}/syslibs" ]; then
                echo "Removing legacy Playwright MCP artifacts..."
                rm -rf \
                  "${TOOLS_DIR}/npm-global/bin/playwright-mcp" \
                  "${TOOLS_DIR}/npm-global/lib/node_modules/@playwright" \
                  "${TOOLS_DIR}/syslibs"
              fi

              # Fast path: stamp matches AND all components verified on the PVC.
              if [ -f "${MARKER}" ] && grep -qx "${INSTALL_STAMP}" "${MARKER}" \
                 && _node_ok && _npm_ok && _uv_ok && _serena_ok; then
                echo "sam-tools already at ${INSTALL_STAMP}, skipping"
                exit 0
              fi

              mkdir -p "${TOOLS_DIR}/npm-global"

              # Stamp-only update: all components present but stamp has changed.
              # Skips apt and the expensive chown; just rewrites the marker.
              if _node_ok && _npm_ok && _uv_ok && _serena_ok; then
                printf '%s\n' "${INSTALL_STAMP}" > "${MARKER}"
                echo "sam-tools components up-to-date, stamp updated to ${INSTALL_STAMP}"
                exit 0
              fi

              echo "Installing missing sam-tools components..."

              # Determine which apt packages are needed (npm reinstall needs none).
              APT_EXTRA=""
              if ! _node_ok || ! _uv_ok; then APT_EXTRA="${APT_EXTRA} curl"; fi
              if ! _node_ok; then APT_EXTRA="${APT_EXTRA} xz-utils"; fi
              if ! _serena_ok; then APT_EXTRA="${APT_EXTRA} git"; fi

              # Only run apt when system packages are actually required.
              # The namespace egress policy only permits TCP/443; switch apt to HTTPS.
              # Debian 12 (bookworm) uses DEB822 format in /etc/apt/sources.list.d/debian.sources.
              if [ -n "${APT_EXTRA}" ]; then
                sed -i \
                  's|http://deb.debian.org|https://deb.debian.org|g;
                   s|http://security.debian.org|https://security.debian.org|g' \
                  /etc/apt/sources.list.d/debian.sources /etc/apt/sources.list 2>/dev/null || true
                # Bootstrap ca-certificates (peer verification disabled for first two calls only).
                apt-get -o Acquire::https::Verify-Peer=false update -qq
                apt-get -o Acquire::https::Verify-Peer=false install -y \
                  --no-install-recommends ca-certificates
                apt-get update -qq
                # shellcheck disable=SC2086
                apt-get install -y --no-install-recommends ${APT_EXTRA}
              fi

              # Node.js from official tarball (pinned to NODE_VERSION).
              if ! _node_ok; then
                echo "Installing Node.js ${NODE_VERSION}..."
                rm -rf "${TOOLS_DIR}/node"
                curl -fsSL \
                  "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
                  | tar -xJ --no-same-owner -C "${TOOLS_DIR}/"
                mv "${TOOLS_DIR}/node-v${NODE_VERSION}-linux-x64" "${TOOLS_DIR}/node"
              fi
              if [ -x "${TOOLS_DIR}/node/bin/node" ]; then
                npm config set prefix "${TOOLS_DIR}/npm-global"
              fi

              # Context7 MCP: install independently so a killed pod only resumes this one.
              if ! [ -x "${TOOLS_DIR}/npm-global/bin/context7-mcp" ]; then
                echo "Installing @upstash/context7-mcp..."
                rm -rf "${TOOLS_DIR}/npm-global/lib/node_modules/@upstash"
                npm install -g @upstash/context7-mcp
              fi

              # agent-browser (Vercel CLI): spawned by zeroclaw's agent_browser browser backend.
              if ! [ -x "${TOOLS_DIR}/npm-global/bin/agent-browser" ]; then
                echo "Installing agent-browser..."
                rm -rf "${TOOLS_DIR}/npm-global/lib/node_modules/agent-browser"
                npm install -g agent-browser
              fi

              # uv (Python package manager, required for Serena).
              if ! _uv_ok; then
                echo "Installing uv..."
                mkdir -p "${TOOLS_DIR}/home/.local/bin"
                curl -fsSL \
                  "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz" \
                  | tar -xz --no-same-owner -C "${TOOLS_DIR}/home/.local/bin" --strip-components=1
              fi

              # Serena: permanently installed so the sidecar needs no git at runtime.
              if ! _serena_ok; then
                echo "Installing Serena..."
                # The uv git cache may be owned by uid 1000 from a previous run's chown,
                # triggering git's dubious-ownership check when running as root.
                printf '[safe]\n\tdirectory = *\n' > "${TOOLS_DIR}/home/.gitconfig"
                export GIT_CONFIG_GLOBAL="${TOOLS_DIR}/home/.gitconfig"
                uv tool install git+https://github.com/oraios/serena
                unset GIT_CONFIG_GLOBAL
                # Chown is only needed after a Serena/uv install since those are the
                # only operations that write root-owned files into home/. Skipping it
                # on every other slow-path trigger saves several minutes per restart.
                chown -R 1000:1000 "${TOOLS_DIR}/home/"
              fi

              printf '%s\n' "${INSTALL_STAMP}" > "${MARKER}"
              echo "sam-tools installation complete"

          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: sam-tools
              mountPath: /opt/sam-tools
            - name: zeroclaw-data
              mountPath: /data
            - name: zeroclaw-serena-cli
              mountPath: /etc/zeroclaw-scripts
      containers:
        - name: zeroclaw
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/.zeroclaw /data/workspace /tmp/agent-browser
              cd /data/workspace
              # Pre-start the agent-browser daemon so it's warm when zeroclaw
              # needs it. Playwright initialization (browser discovery + first
              # launch) can take 60-90s on a cold NFS-backed volume.
              # Redirect stdin from /dev/null so process.stdin.resume() inside
              # the daemon doesn't trigger SIGTTIN when run in background.
              node /opt/sam-tools/npm-global/lib/node_modules/agent-browser/dist/daemon.js </dev/null &
              # Wait up to 180s for the socket to appear before starting zeroclaw.
              # Cold starts on NFS-backed volumes can take ~140s for Playwright init.
              echo "Waiting for agent-browser daemon socket..."
              for _i in $(seq 1 180); do
                [ -S /tmp/agent-browser/default.sock ] && echo "Daemon ready." && break
                sleep 1
              done
              [ -S /tmp/agent-browser/default.sock ] || echo "Warning: daemon socket not ready, starting zeroclaw anyway"
              exec /opt/zeroclaw/zeroclaw daemon
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /data
            - name: PATH
              value: /opt/sam-tools/node/bin:/opt/sam-tools/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: NPM_CONFIG_PREFIX
              value: /opt/sam-tools/npm-global
            - name: AGENT_BROWSER_SOCKET_DIR
              value: /tmp/agent-browser
            - name: AGENT_BROWSER_ARGS
              value: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage"
            - name: SERENA_SESSION_FILE
              value: /data/.zeroclaw/serena-session-id
            - name: SERENA_DEFAULT_PROJECT
              value: sam
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-secrets
                  key: openrouter-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-secrets
                  key: anthropic-api-key
                  optional: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /opt/zeroclaw
              readOnly: true
            - name: zeroclaw-data
              mountPath: /data
            - name: zeroclaw-config
              mountPath: /data/.zeroclaw
            - name: sam-tools
              mountPath: /opt/sam-tools
        - name: serena
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/workspace
              cd /data/workspace
              exec /opt/sam-tools/home/.local/bin/serena start-mcp-server \
                --transport streamable-http \
                --port 9121 \
                --enable-web-dashboard false \
                --enable-gui-log-window false \
                --project sam
          ports:
            - name: serena-mcp
              containerPort: 9121
              protocol: TCP
          env:
            - name: HOME
              value: /opt/sam-tools/home
            - name: PATH
              value: /opt/sam-tools/node/bin:/opt/sam-tools/npm-global/bin:/opt/sam-tools/home/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: UV_TOOL_DIR
              value: /opt/sam-tools/home/.local/share/uv/tools
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: sam-tools
              mountPath: /opt/sam-tools
            - name: zeroclaw-data
              mountPath: /data
        - name: signal-api-adapter
          image: ttl.sh/signal-api-adapter-zeroclaw:24h
          imagePullPolicy: Always
          ports:
            - name: signal-adapt
              containerPort: 8686
              protocol: TCP
          env:
            - name: BRIDGE_BASE_URL
              value: http://signal-cli-daemon.zeroclaw-test.svc.cluster.local:8686
            - name: LISTEN_ADDR
              value: :8686
            - name: POLL_TIMEOUT_SECONDS
              value: "20"
            - name: SIGNAL_ACCOUNT
              value: "+15873986009"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: zeroclaw-data
          persistentVolumeClaim:
            claimName: zeroclaw-data
        - name: zeroclaw-config
          persistentVolumeClaim:
            claimName: zeroclaw-config
        - name: sam-tools
          persistentVolumeClaim:
            claimName: zeroclaw-sam-tools
        - name: zeroclaw-config-template
          configMap:
            name: zeroclaw-config
        - name: zeroclaw-serena-cli
          configMap:
            name: zeroclaw-serena-cli
