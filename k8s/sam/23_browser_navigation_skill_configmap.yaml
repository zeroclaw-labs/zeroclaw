    # Browser Navigation

    The browser tool controls a headless Chromium instance via the agent-browser
    daemon. It's stateful — the page, load state, and scroll position all persist
    between calls. These patterns prevent the most common mistakes.

    ## Browser vs Python HTTP

    Before reaching for the browser, ask: does this need a rendered page?

    - **Use browser** for: pages with JavaScript rendering, SPAs, clicking through
      UIs, filling forms, reading content that requires visual layout
    - **Use Python urllib/shell** for: REST APIs, JSON endpoints, downloading files,
      anything with a predictable response format

    The browser is expensive (full Chromium render cycle per action). A 3-line
    Python script is faster and more reliable for structured data.

    ## Snapshot vs Screenshot

    **Snapshot** returns the accessibility tree as structured text with `ref`
    identifiers for each interactive element. This is your primary tool for
    understanding what's on the page — it's searchable, parseable, and gives
    you refs to click or fill elements.

    **Screenshot** returns a visual image you can see (you're multimodal) but
    can't search or parse. Use it only for visual verification.

    **Decision rule:**
    - Need to read, search, or interact → snapshot
    - Need to send Dan a visual → screenshot (save to file, attach via Signal)
    - Starting a new page → always snapshot first

    **Vision limitation:** Your LLM backend cannot process inline images. Do
    not use `image_info(include_base64: true)` to "view" screenshots — it will
    error. If you need to understand what's on the page, use snapshot (text).
    Screenshots are for sending to Dan, not for your own analysis.

    ## Navigation Sequence

    Every page visit follows this pattern:

    1. `browser` with `action: open, url: "https://..."`
    2. `browser` with `action: wait, ms: 2000` — JS-heavy pages need render time
    3. `browser` with `action: snapshot` — understand what loaded

    If the snapshot looks empty or incomplete, the page may still be rendering.
    Wait longer (3-5 seconds) and snapshot again. Check `action: get_url` to
    confirm you're on the right page.

    ## Targeting Elements

    Three strategies, in order of preference:

    **Refs from snapshot** — After a snapshot, each interactive element has a
    ref like `@e1`, `@e2`, etc. Use `action: click, selector: "@e42"` to
    interact. Most reliable because the ref matches the current DOM state.

    **Semantic find** — Use when you know the visible text or role without
    needing a snapshot first: `action: find, by: text, value: "Submit", action: click`

    The `by` parameter:
    - `text` — visible text content ("Sign In", "Next Page")
    - `role` — ARIA role (button, link, heading, textbox)
    - `label` — form field label ("Email", "Password")
    - `placeholder` — input placeholder text
    - `testid` — data-testid attribute (rare, for test-instrumented pages)

    **CSS selectors** — `action: click, selector: "#submit-btn"`. Use only when
    you know the exact selector. Fragile on unfamiliar pages.

    ## Recovery Patterns

    **Empty snapshot after navigation:**
    Wait longer, then snapshot again. If still empty, verify the URL loaded
    correctly with `action: get_url`. Some pages redirect — you may not be
    where you think you are.

    **Element not found:**
    The element may be below the fold. Scroll down with
    `action: scroll, direction: down, pixels: 500`, then snapshot again.
    Also check for modal overlays or cookie consent banners blocking the page —
    dismiss those first.

    **Form submission doesn't work:**
    Some forms need `action: press, key: Enter` after filling, not a button
    click. Check for client-side validation errors in the snapshot.

    **Login wall or CAPTCHA:**
    Report to Dan — you can't solve CAPTCHAs or log in without credentials.
    If Dan provides credentials, use `action: fill` for username/password fields,
    then submit.

    ## Common Mistakes

    - Screenshotting to read text — snapshot or get_text is faster and parseable
    - Guessing CSS selectors without a snapshot — snapshot first, use @eN refs
    - Using wrong ref format — it's `@e1` not `ref=1` or `#ref1`
    - Rapid-fire actions without waits — the browser is async, give it time
    - Retrying the same failing action — if it failed twice, change your approach
    - Using browser for API calls — use Python urllib instead
    - Letting snapshots accumulate — large snapshots (10-70KB each) grow the
      context fast. If visiting multiple sites, `action: close` between them
    - Using image_info(include_base64: true) to view images — your backend
      can't process inline images. Use snapshot for content, screenshot for Dan
