    ---
    name: k8s-manifest-builder
    version: 2.0.0
    description: Structured workflow for creating, deploying, and maintaining K8s manifests in the scrapyard cluster. Use for any deployment, service creation, infrastructure task, or PR review feedback in the todolist namespace.
