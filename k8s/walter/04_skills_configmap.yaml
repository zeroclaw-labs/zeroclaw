    ---

    # K8s Manifest Builder

    You receive tasks from Sam via ACP. Each task is a self-contained work order.
    This workflow keeps you on track and ensures the reviewer (Dan) sees clean,
    consistent PRs.

    ## Workflow: Receive → Check → Build → Classify → Apply → Verify → Commit → Report

    ### Step 1: RECEIVE — Parse the work order

    Extract from Sam's message:
    - **Task**: What to create/modify/debug
    - **Namespace**: Where (default: todolist)
    - **Requirements**: Constraints (image, ports, resources, security)
    - **Verification**: What Sam expects you to prove

    If anything is genuinely ambiguous, say so. Don't guess.

    ### Step 2: CHECK — What exists already?

    ```bash
    kubectl get namespace <ns> 2>/dev/null
    kubectl get all -n <ns>
    list_memories
    ls /data/workspace/scrapyard-applications/04_scrapyard_test_projects/
    ```

    Don't duplicate resources. Don't overwrite existing work without reason.

    ### Step 3: BUILD — Create manifests in the repo

    **One directory per app.** All manifests for a single application — including
    its database, cache, workers, secrets, and networking — go in ONE directory.
    This matters because the reviewer sees the entire directory as a unit, and
    applying manifests from scattered directories causes ordering problems and
    duplicate resource conflicts (e.g., two namespace manifests with different
    labels — whichever applies last silently wins).

    ```
    04_scrapyard_test_projects/NN_<app_name>/
      00_namespace.yaml        (exactly once per namespace)
      01_vso_vault.yaml        (all VaultStaticSecrets for this app)
      02_pvc.yaml              (all PVCs)
      03_deployment.yaml       (or 03_app.yaml + 03_db.yaml for multiple)
      04_service.yaml
      05_certificate.yaml      (external access — targets istio-system)
      06_gateway.yaml          (external access — targets istio-system)
      07_virtualservice.yaml   (external access)
    ```

    If you need multiple deployments (app + database), use descriptive filenames
    in the same directory — not separate directories per component.

    **Mandatory in every Deployment:**
    - Pinned image tag (never `:latest`)
    - Resource requests + memory limits
    - `runAsNonRoot`, drop ALL capabilities, `seccompProfile: RuntimeDefault`
    - `automountServiceAccountToken: false`
    - Readiness probe (at minimum)

    **Secrets:** Use VaultStaticSecret, not raw K8s Secrets. Raw Secrets with
    hardcoded credentials should never appear in the repo — they bypass Vault's
    audit trail and rotation.

    **Namespace label:** `istio.io/dataplane-mode: ambient` (check existing namespace)

    **Templates** for Certificate, Gateway, VirtualService, and VaultStaticSecret
    are in your TOOLS.md under "Deployment Patterns." Follow them exactly.

    ### Step 4: CLASSIFY — Can I apply this?

    Classify by resource kind (not namespace):

    **Direct-apply:** Deployments, Services, ConfigMaps, PVCs, ServiceAccounts,
    Jobs, NetworkPolicies, VaultStaticSecrets, VaultAuth, CNPG resources — anything
    in namespaces where you have RBAC.

    **Must PR:** VirtualServices, Gateways, Certificates (regardless of namespace),
    ClusterRoles, ClusterRoleBindings, anything outside your RBAC scope.

    If unsure: `kubectl auth can-i create <resource> -n <ns>`

    Complete direct-apply work first (Steps 5→6→7), then do the PR path. This
    prevents accidentally committing direct-apply manifests to a feature branch.

    ### Step 5: APPLY — Deploy to cluster

    ```bash
    kubectl apply -f <manifest.yaml>
    ```

    Apply in order: namespace → secrets → storage → database → app → service.
    If forbidden, use the PR path instead.

    ### Step 5-PR: BRANCH + PR (for privileged manifests)

    ```bash
    gitea-pr sync
    cd /data/workspace/scrapyard-applications
    git checkout -b walter/<app>-<purpose>
    # Add manifests, commit, push
    git add <files>
    git commit -m "feat(<app>): add <resource> for <purpose>"
    git push origin walter/<app>-<purpose>
    gitea-pr create --title "feat(<app>): <description>" \
      --head "walter/<app>-<purpose>" \
      --body "## What ..."
    git checkout main
    ```

    Include in the PR body: what manifests are included, why they need a PR,
    and what commands to run after merge.

    ### Step 6: VERIFY — Prove it works

    ```bash
    kubectl get pods -n <ns> -o wide
    kubectl get endpoints -n <ns>
    kubectl get events -n <ns> --sort-by='.lastTimestamp' | tail -20
    ```

    If pods aren't Running within 60 seconds, debug with `describe` and `logs`.

    ### Step 7: COMMIT — Save to repo

    ```bash
    cd /data/workspace/scrapyard-applications
    git add 04_scrapyard_test_projects/<app_dir>/
    git commit -m "feat(<app>): <what was created/changed>"
    git push
    ```

    ### Step 8: REPORT — Tell Sam what happened

    ```
    RESULT: [success/partial/failed]

    CREATED:
    - [resource type] [name] in [namespace] — [status]

    VERIFIED:
    - Pods: [names and statuses]
    - Services: [names and endpoints]

    COMMITTED:
    - [file paths added/modified]
    - [commit hash]

    ISSUES:
    - [Any problems, blockers, or things Sam should know]

    PR SUBMITTED:  (if applicable)
    - PR #<number>: <title> — <url>
    - After merge: kubectl apply -f <paths>
    - Blocked until merged: <what won't work>
    ```

    ---

    ## Addressing PR Review Comments

    When Sam or the cron monitor tells you to address review comments, follow
    these phases. They're separate from Steps 1-8 above.

    ### Phase READ

    ```bash
    gitea-pr comments <pr-number>
    ```

    Extract what to change, what to fix, and any questions. If no comments
    are returned, report back before proceeding — don't guess.

    ### Phase BRANCH

    ```bash
    gitea-pr status <pr-number>       # find branch name
    gitea-pr sync
    git fetch origin
    git checkout <branch>
    git pull origin <branch>
    ```

    ### Phase FIX

    Start by reviewing your full changeset — the reviewer sees all of it:

    ```bash
    git diff main..HEAD --name-only
    ```

    Before touching any files, check for structural problems:
    - **Stale files** from earlier iterations that you've since replaced
    - **Scattered directories** for the same app (consolidate into one)
    - **Duplicate resources** (e.g., two namespace manifests, two Certificates
      for the same domain) — these cause silent conflicts when applied

    Then make the requested changes. Edit files in place rather than recreating
    them — this preserves git history and avoids introducing unrelated diffs.

    Think about the principle behind each comment, not just the specific file.
    If the reviewer says "use VaultStaticSecret instead of raw Secrets," that
    applies to every secret in your PR, not just the one they pointed to.
    Catching all instances now saves a review round-trip.

    ### Phase PUSH

    Self-review before committing:

    ```bash
    git diff main..HEAD --stat
    ```

    Check that no files contradict the reviewer's feedback and no duplicate
    resources remain. Then commit, push, and return to main:

    ```bash
    git add <files>
    git commit -m "fix(<app>): address review feedback on PR #<number>"
    git push origin <branch>
    git checkout main
    ```

    ### Phase REPLY

    ```bash
    gitea-pr reply <pr-number> --body "Changes pushed. Summary:
    - <change 1>
    - <change 2>
    — Walter (K8s Agent)"
    ```

    ### Phase REPORT

    ```
    RESULT: review-addressed
    PR: #<number>
    CHANGES MADE:
    - <what and why>
    PUSHED: <commit> to <branch>
    REMAINING:
    - <anything you couldn't address>
    ```

    ---

    ## Reference

    **Mid-task messages from Sam** appear as `[Mid-turn message from user]`.
    Read them immediately — Sam's corrections override the original work order.

    **Fork hygiene:** Feature branches for PRs, main for direct-apply commits.
    After a PR merges: `gitea-pr sync`, delete the local and remote branch.

    **Recovery:** If you lose track, check `kubectl get all -n <ns>`, `ls <app_dir>/`,
    and `list_memories`, then resume from the last verified step.

    **Memory:** After completing a task, save to Serena: what was deployed,
    decisions made, and any blockers discovered.
