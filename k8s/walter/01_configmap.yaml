apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-k8s-agent-config
  namespace: ai-agents
data:
  config.toml: |
      # Zeroclaw K8s Infrastructure Agent
      # Receives tasks from Sam via ACP, executes k8s operations, reports results.
      #
      # Secrets injected via environment variables:
      #   API_KEY                          — LiteLLM proxy API key
      #   ZEROCLAW_GATEWAY_PAIRED_TOKENS   — pre-shared gateway auth tokens
      default_provider = "custom:https://assistant-api.coffee-anon.com/v1"
      # LiteLLM v1.82.0 has no working /v1/responses passthrough for hosted_vllm;
      # the chat→responses fallback converts transport errors into non-retryable
      # 400s (scrapyard-wiki/incidents/2026-04-10). Keep explicitly disabled.
      supports_responses_fallback = false
      default_model = "litellm-local-default-vision"
      default_temperature = 0.7
      model_support_vision = false
      strip_prior_reasoning = true
      context_window_tokens = 131072

      [autonomy]
      level = "full"
      workspace_only = false
      allowed_commands = ["*"]
      forbidden_paths = [
          "/etc",
          "/root",
          "/home",
          "/usr",
          "/bin",
          "/sbin",
          "/lib",
          "/opt",
          "/boot",
          "/dev",
          "/proc",
          "/sys",
          "/var",
          "~/.ssh",
          "~/.gnupg",
          "~/.aws",
          "~/.config",
      ]
      max_actions_per_hour = 9999
      max_cost_per_day_cents = 500
      allow_shell_redirections = true
      require_approval_for_medium_risk = false
      block_high_risk_commands = false
      non_cli_excluded_tools = []
      non_cli_natural_language_approval_mode = "direct"
      shell_env_passthrough = ["KUBECONFIG", "GIT_CONFIG_GLOBAL", "GITEA_API_TOKEN"]

      [research]
      trigger = "never"

      [reliability]
      provider_retries = 5

      [agent]
      max_tool_iterations = 50
      loop_detection_no_progress_threshold = 8
      loop_detection_failure_streak = 5

      [heartbeat]
      enabled = false
      interval_minutes = 30

      [proactive_messaging]
      enabled = false

      [[proactive_messaging.quiet_hours]]
      start_hour = 22
      end_hour = 7
      timezone = "America/Edmonton"

      [goal_loop]
      enabled = false
      interval_minutes = 10
      step_timeout_secs = 120
      max_steps_per_cycle = 3

      [channels_config]
      cli = true
      message_timeout_secs = 600

      [memory]
      backend = "sqlite"
      auto_save = true
      embedding_provider = "none"

      [gateway]
      port = 3000
      host = "0.0.0.0"
      require_pairing = true
      allow_public_bind = true

      [gateway.acp_server]
      enabled = true
      session_ttl_secs = 7200
      max_concurrent_sessions = 1

      [composio]
      enabled = false

      [secrets]
      encrypt = false

      [browser]
      enabled = false

      [identity]
      format = "openclaw"

      [cost]
      enabled = true

      [cost.prices."anthropic/claude-opus-4-20250514"]
      input = 15.0
      output = 75.0

      [cost.prices."anthropic/claude-sonnet-4-20250514"]
      input = 3.0
      output = 15.0

      [cost.prices."google/gemini-2.0-flash"]
      input = 0.1
      output = 0.4

      [presentation]
      max_output_lines = 200
      max_output_bytes = 51200
      strip_ansi = true
      show_metadata = true
      overflow_dir = "/tmp/cmd-output"

      [mcp]
      enabled = true

      [[mcp.servers]]
      name = "serena"
      transport = "http"
      url = "http://127.0.0.1:9121/mcp"
      tool_timeout_secs = 60
