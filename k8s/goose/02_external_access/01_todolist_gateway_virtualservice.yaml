apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: gateway-todolist
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - todolist.coffee-anon.com
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - todolist.coffee-anon.com
      tls:
        mode: SIMPLE
        credentialName: todolist-certificate-secret-production
---
# VirtualService — update the destination host and port once the
# todolist application service is created by the goose agent.
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: todolist-virtual-service
  namespace: todolist
spec:
  hosts:
    - todolist.coffee-anon.com
  gateways:
    - istio-system/gateway-todolist
  http:
    - route:
        - destination:
            host: todolist  # update to match the service name goose creates
            port:
              number: 80    # update to match the service port goose creates
