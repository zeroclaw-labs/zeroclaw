# CiliumNetworkPolicy to allow goose-acp egress to the Kubernetes API server.
#
# Cilium assigns a special identity to kube-apiserver that doesn't match
# standard ipBlock selectors in Kubernetes NetworkPolicy. The toEntities
# selector is required for Cilium to allow this traffic.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: goose-acp-allow-kube-apiserver
  namespace: ai-agents
spec:
  endpointSelector:
    matchLabels:
      app: goose-acp
  egress:
    - toEntities:
        - kube-apiserver
