# Goose ACP-over-HTTP agent — runs alongside the existing goose-subagent (v1.27.2).
#
# This deployment uses the goose-acp-server binary from main branch, which provides
# the standardized ACP protocol (JSON-RPC 2.0 over HTTP + SSE) on a single /acp endpoint.
#
# ACP Protocol:
#   POST /acp   — JSON-RPC requests (initialize, session/new, session/prompt)
#   GET  /acp   — SSE stream or WebSocket (with Acp-Session-Id header)
#   DELETE /acp — Tear down session
#   GET  /health — Health check
#
# In-cluster endpoint:
#   http://goose-acp.ai-agents.svc.cluster.local:8080
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: goose-acp
  namespace: ai-agents
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        app: goose-acp
        agent-role: coding
        protocol: acp-http
    spec:
      serviceAccountName: goose-todolist-configurator
      automountServiceAccountToken: true
      initContainers:
        - name: fix-permissions
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /home/goose/.local/state/goose/logs /home/goose/.kube
              # Generate kubeconfig using tokenFile for auto-refreshing SA token
              cat > /home/goose/.kube/config <<'KUBEEOF'
              apiVersion: v1
              kind: Config
              clusters:
                - cluster:
                    certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    server: https://kubernetes.default.svc
                  name: in-cluster
              contexts:
                - context:
                    cluster: in-cluster
                    namespace: todolist
                    user: goose-todolist
                  name: todolist
              current-context: todolist
              users:
                - name: goose-todolist
                  user:
                    tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              KUBEEOF
              chmod 600 /home/goose/.kube/config
              chown -R 1000:1000 /home/goose/.local /home/goose/.config /home/goose/workspace /home/goose/.kube
          volumeMounts:
            - name: goose-acp-data
              mountPath: /home/goose/.local
            - name: goose-acp-config
              mountPath: /home/goose/.config
            - name: workspace
              mountPath: /home/goose/workspace
            - name: kube-config
              mountPath: /home/goose/.kube
          securityContext:
            runAsUser: 0
        - name: git-setup
          image: alpine/git:2.47.2
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /home/goose/.config/git
              cat > /home/goose/.config/git/config <<GITEOF
              [credential]
                  helper = store --file=/home/goose/.config/git/credentials
              [user]
                  name = Goose ACP Agent
                  email = goose-acp@scrapyard.local
              [safe]
                  directory = /home/goose/workspace/scrapyard-applications
              GITEOF
              echo "https://dan:${GIT_TOKEN}@gitea.coffee-anon.com" > /home/goose/.config/git/credentials
              chmod 600 /home/goose/.config/git/credentials
              mkdir -p /home/goose/.config/goose
              REPO_DIR="/home/goose/workspace/scrapyard-applications"
              if [ -d "${REPO_DIR}/.git" ]; then
                echo "Repository exists, pulling latest..."
                cd "${REPO_DIR}" && git pull --ff-only || echo "Pull failed, continuing with existing state"
              else
                echo "Cloning scrapyard-applications..."
                git clone https://gitea.coffee-anon.com/dan/scrapyard-applications.git "${REPO_DIR}"
              fi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: goose-credentials
                  key: GIT_TOKEN
            - name: HOME
              value: /home/goose
          volumeMounts:
            - name: goose-acp-config
              mountPath: /home/goose/.config
            - name: workspace
              mountPath: /home/goose/workspace
          securityContext:
            runAsUser: 1000
      containers:
        - name: goose-acp
          image: citizendaniel/goose-acp-server:latest
          args: ["--host", "0.0.0.0", "--port", "8080", "--builtin", "developer"]
          ports:
            - containerPort: 8080
              name: acp-http
              protocol: TCP
          env:
            - name: GOOSE_PROVIDER
              value: "litellm"
            - name: GOOSE_MODEL
              value: "litellm-local-routed"
            - name: LITELLM_HOST
              value: "http://litellm-service.llama.svc.cluster.local:4000"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: goose-credentials
                  key: LITELLM_API_KEY
            - name: GIT_CONFIG_GLOBAL
              value: /home/goose/.config/git/config
            - name: GOOSE_MODE
              value: "auto"
            - name: GOOSE_CONTEXT_STRATEGY
              value: "summarize"
            - name: GOOSE_MAX_TURNS
              value: "50"
            - name: GOOSE_DISABLE_SESSION_NAMING
              value: "true"
            - name: RUST_LOG
              value: "info"
            - name: KUBECONFIG
              value: /home/goose/.kube/config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: goose-acp-data
              mountPath: /home/goose/.local
            - name: goose-acp-config
              mountPath: /home/goose/.config
            - name: workspace
              mountPath: /home/goose/workspace
            - name: kube-config
              mountPath: /home/goose/.kube
              readOnly: true
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            tcpSocket:
              port: acp-http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: acp-http
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: kube-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: goose-acp-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: 2Gi
    - metadata:
        name: goose-acp-config
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: 100Mi
