# ServiceAccount for the goose agent to configure the todolist namespace.
# Lives in ai-agents (where goose runs); permissions are bound into todolist
# via cross-namespace RoleBinding.
#
# Token generation (24h, renewable):
#   kubectl create token goose-todolist-configurator -n ai-agents --duration=24h
#
# To extend when the token expires:
#   kubectl create token goose-todolist-configurator -n ai-agents --duration=24h
#   # Update the kubeconfig with the new token:
#   kubectl config set-credentials goose-todolist \
#     --token="<new-token>" \
#     --kubeconfig=goose-todolist.kubeconfig
apiVersion: v1
kind: ServiceAccount
metadata:
  name: goose-todolist-configurator
  namespace: ai-agents
  labels:
    app: goose-todolist
    purpose: namespace-configurator
automountServiceAccountToken: false
