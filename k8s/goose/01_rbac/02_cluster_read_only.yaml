# Read-only access to cluster-scoped resources for discovery.
# The agent needs to understand the cluster environment (available storage classes,
# node capabilities, CRDs, etc.) to make informed deployment decisions.
#
# Explicitly excludes: ClusterRoles, ClusterRoleBindings, Secrets (cluster-scoped),
# and any namespace-scoped resources in other namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: goose-todolist-cluster-reader
  labels:
    app: goose-todolist
    purpose: namespace-configurator
rules:
  # Storage discovery
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  # Node discovery (capacity, labels, taints)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Namespace listing (to verify todolist exists, not to read others' contents)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # CRD discovery (what custom resources are available)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  # API discovery
  - apiGroups: [""]
    resources: ["componentstatuses"]
    verbs: ["get", "list"]
  # IngressClass discovery
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingressclasses"]
    verbs: ["get", "list"]
  # PersistentVolume discovery (to understand available PVs)
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: goose-todolist-cluster-reader
  labels:
    app: goose-todolist
    purpose: namespace-configurator
subjects:
  - kind: ServiceAccount
    name: goose-todolist-configurator
    namespace: ai-agents
roleRef:
  kind: ClusterRole
  name: goose-todolist-cluster-reader
  apiGroup: rbac.authorization.k8s.io
