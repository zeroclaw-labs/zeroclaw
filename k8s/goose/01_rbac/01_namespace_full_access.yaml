# Full control over all namespace-scoped resources in todolist.
# This covers everything the agent needs to deploy an application:
# core resources, apps, batch, autoscaling, and policy.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: goose-todolist-full-access
  namespace: todolist
rules:
  # Core API: pods, services, configmaps, secrets, PVCs, serviceaccounts, endpoints
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  # Apps: deployments, statefulsets, daemonsets, replicasets
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  # Batch: jobs, cronjobs
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["*"]
  # Autoscaling: HPA
  - apiGroups: ["autoscaling"]
    resources: ["*"]
    verbs: ["*"]
  # Policy: PodDisruptionBudgets
  - apiGroups: ["policy"]
    resources: ["*"]
    verbs: ["*"]
  # Networking: NetworkPolicies, Ingresses
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: goose-todolist-full-access
  namespace: todolist
subjects:
  - kind: ServiceAccount
    name: goose-todolist-configurator
    namespace: ai-agents
roleRef:
  kind: Role
  name: goose-todolist-full-access
  apiGroup: rbac.authorization.k8s.io
