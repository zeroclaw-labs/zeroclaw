[package]
name = "fill-fluent"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[[bin]]
name = "fill-fluent"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1.0"
tokio = { version = "1.50", default-features = false, features = ["rt-multi-thread", "macros"] }
