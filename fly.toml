app            = "adi-zeroclaw"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    ZEROCLAW_CARGO_FEATURES = "channel-telegram,channel-slack"

[env]
  ZEROCLAW_WORKSPACE = "/zeroclaw-data/workspace"

[[mounts]]
  source       = "zeroclaw_data"
  destination  = "/zeroclaw-data"
  initial_size = "3gb"

[http_service]
  internal_port        = 42617
  force_https          = true
  auto_start_machines  = true
  auto_stop_machines   = "off"
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  interval     = "30s"
  timeout      = "5s"
  grace_period = "20s"
  method       = "get"
  path         = "/health"

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "1024mb"
  cpu_kind = "shared"
