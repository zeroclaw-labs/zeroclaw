# cargo-deny configuration -- v2 schema
# https://embarkstudios.github.io/cargo-deny/
#
# osAgent policy (inherits upstream zeroclaw deny.toml; layered with our adds):
#   1. AGPL Signal SDKs hard-banned — see [bans].deny below (signal-cli subprocess only).
#   2. WTFPL frankenstein hard-banned — teloxide is the Telegram bot crate.
#   3. Phone-home telemetry transports banned (sentry, posthog, honeycomb, opentelemetry-otlp).
#      opentelemetry the facade crate is permitted (no transport).
#   4. wildcards = "deny" — stricter than upstream's "allow"; reproducible builds property.
#   5. all-features = false — only the default-feature resolved graph is checked. The wizard
#      binary's no-MCP property depends on this NOT being flipped to true on workspace builds.
#
# Many of upstream's advisory ignores below target the `plugins-wasm` (Extism/wasmtime) crate
# tree. Phase 1.4 drops zeroclaw-plugins entirely; those advisory ignores become irrelevant
# at that point and will be cleaned up there. Left in place for M1 so the first PR ships
# green.

[graph]
# Only the default-feature graph is checked. The wizard binary's structural MCP exclusion
# (no Cargo.toml dependency edge to osagent-mcp) would be undermined by `all-features = true`
# during `cargo build --workspace` (Cargo resolver=2 feature unification). Do not flip.
all-features = false
no-default-features = false

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    # rand -- re-entrancy unsoundness via custom global logger; fixed in rand 0.8.6
    # for the 0.8.x copy in our tree; the 0.7.x copy predates rand::rng() entirely
    # and is not affected; the 0.9.x copy is outside the advisory's affected range
    { id = "RUSTSEC-2026-0097", reason = "rand re-entrancy unsoundness; 0.8.6 copy is patched; 0.7.x copy predates rand::rng() and is not affected" },
    # rustls-pemfile -- unmaintained, functionality moved to rustls-pki-types;
    # transitive dep, upstream migration tracked
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive dep awaiting upstream migration to rustls-pki-types" },
    # rustls-webpki -- two versions in tree; direct dep bumped in #5786 but a
    # second transitive copy via rumqttc v0.25.1 remains; all advisories below
    # affect only the 0.102.x copy; the 0.103.x copy is patched
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki CRL matching bug; 0.102.x copy via rumqttc v0.25.1; 0.103.x copy is patched; awaiting rumqttc upgrade" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraints; 0.102.x copy via rumqttc v0.25.1; 0.103.x copy is patched; awaiting rumqttc upgrade" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraints; 0.102.x copy via rumqttc v0.25.1; 0.103.x copy is patched; awaiting rumqttc upgrade" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki CRL parsing panic; 0.102.x copy via rumqttc v0.25.1 has no fix in 0.102.x series; 0.103.x copy patched at v0.103.13; awaiting rumqttc upgrade" },
    # glib -- unsoundness in VariantStrIter Iterator/DoubleEndedIterator impls;
    # transitive via zeroclaw-desktop (tauri -> webkit2gtk); glib 0.18.5 is the
    # latest compatible version with the GTK3 stack; fix requires gtk-rs series bump
    { id = "RUSTSEC-2024-0429", reason = "glib VariantStrIter unsoundness; transitive via zeroclaw-desktop/tauri/webkit2gtk; no compatible fix in glib 0.18.x series" },
    # wasmtime -- multiple advisories via extism 1.21.0 which pins wasmtime 41.x;
    # all CVEs fixed in wasmtime 42.0.2; extism has not released a version with
    # wasmtime 42+; plugins are feature-gated behind --features plugins-wasm;
    # the critical aarch64 sandbox-escape CVEs require the Winch compiler backend
    # which is not enabled in production (default Cranelift backend is unaffected)
    { id = "RUSTSEC-2026-0085", reason = "wasmtime flags component panic; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0086", reason = "wasmtime 64-bit table data leakage (Winch); extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0087", reason = "wasmtime f64x2.splat Cranelift segfault; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0088", reason = "wasmtime pooling allocator data leakage; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0089", reason = "wasmtime Winch table.fill panic; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0091", reason = "wasmtime OOB write transcoding strings; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0092", reason = "wasmtime UTF-16 transcoding panic; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0093", reason = "wasmtime heap OOB read UTF-16 transcoding; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0094", reason = "wasmtime Winch table.grow return value; extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release" },
    { id = "RUSTSEC-2026-0095", reason = "wasmtime Winch aarch64 sandbox escape (critical); extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release; Winch backend not used in production" },
    { id = "RUSTSEC-2026-0096", reason = "wasmtime Cranelift aarch64 sandbox escape (critical); extism 1.21 pins wasmtime 41.x; fixed in wasmtime 42.0.2; awaiting extism release; default Cranelift backend on x86-64 unaffected" },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"   # promote to "deny" once Phase 1.5 strip stabilises the dep tree
wildcards = "deny"           # `x = "*"` blocks reproducible builds; stricter than upstream
highlight = "all"

# Hard-banned crates. Each entry has a reason for future-Claude/future-Andreas.
deny = [
    # ── AGPL contamination defense (research/STACK.md Refinement #3) ──
    # All Rust Signal SDKs are AGPL-3.0 and would force the entire osAgent binary under AGPL
    # via transitive linking. Signal support ships as subprocess management around the
    # standalone `signal-cli` (GPLv3 Java daemon, mere-aggregation via Unix-socket JSON-RPC).
    # M4 scope. Until then, anyone trying to `cargo add presage` gets blocked at CI.
    { name = "presage", reason = "AGPL-3.0; use signal-cli subprocess instead (M4)" },
    { name = "libsignal-service", reason = "AGPL-3.0; use signal-cli subprocess instead (M4)" },
    { name = "libsignal", reason = "AGPL-3.0; use signal-cli subprocess instead (M4)" },

    # ── License audit ban: WTFPL ──
    # frankenstein is a Telegram bot SDK alternative; license WTFPL is rejected by enterprise
    # SBOM scanners. teloxide (MIT) is the adopted alternative for M2 Telegram channel work.
    { name = "frankenstein", reason = "WTFPL; use teloxide instead" },

    # ── Phone-home transports (telemetry strip, Phase 1.4) ──
    # Explicit telemetry/observability transports that send data out-of-band. We do not ship them.
    # opentelemetry the facade crate is permitted (no transport); opentelemetry-otlp the OTLP
    # exporter is not.
    { name = "sentry", reason = "phone-home telemetry transport; not shipping" },
    { name = "sentry-core", reason = "phone-home telemetry transport; not shipping" },
    { name = "sentry-tracing", reason = "phone-home telemetry transport; not shipping" },
    { name = "posthog-rust", reason = "phone-home telemetry transport; not shipping" },
    { name = "honeycomb-tracing", reason = "phone-home telemetry transport; not shipping" },
    # TODO(phase-1.4): the opentelemetry-otlp ban is currently unreachable under
    # all-features=false (it's optional, behind the `observability-otel` feature which is OFF
    # in defaults). Listed so Phase 1.4 has an obvious deletion target and a future workspace
    # re-feature wiring cannot silently relink it.
    { name = "opentelemetry-otlp", reason = "OTLP exporter is phone-home; opentelemetry facade is permitted" },
]

# skip-tree: leaving empty at M1. Phase 1.5 may add entries if a kept-but-trimmed crate has
# a duplicate-version cluster we want to ignore for `multiple-versions` purposes.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
