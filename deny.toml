# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    # bincode v2.0.1 via probe-rs — upstream project ceased; accepted transitive risk for current hardware stack.
    { id = "RUSTSEC-2025-0141", reason = "Transitive via probe-rs in current release path; tracked for replacement when probe-rs updates." },
    { id = "RUSTSEC-2024-0384", reason = "Reported to `rust-nostr/nostr` and it's WIP" },
    # derivative v2.2.0 via wasm_evt_listener -> matrix_indexed_db_futures -> matrix-sdk-indexeddb.
    # This chain is transitive under matrix-sdk's IndexedDB integration path; matrix-sdk remains pinned to 0.16 in current release line.
    { id = "RUSTSEC-2024-0388", reason = "Transitive via matrix-sdk indexeddb dependency chain; tracked until matrix-sdk ecosystem removes derivative." },
    # paste v1.0.15 via wasmtime runtime stack.
    { id = "RUSTSEC-2024-0436", reason = "Transitive via wasmtime dependency stack; tracked until upstream removes or replaces paste." },
    # rustls-webpki v0.102.8 — transitive via the OPT-IN `mqtt` feature only.
    #
    # Consumer trace (2026-05-04, PR-K2):
    #   zeroclaw  --features=mqtt-->  rumqttc 0.25.1  -->  rustls-webpki 0.102.8
    #
    # rumqttc 0.25.1 is the latest published version on crates.io. It
    # declares its `rustls-webpki` dep without a major-version bound for
    # the modern (0.103.x / rustls 0.23) branch even though it ships
    # compatibility with both 0.102.x and 0.103.x. Cargo's resolver
    # therefore picks 0.102.8 to satisfy rumqttc and the modern 0.103.13
    # to satisfy our other rustls users (reqwest, axum, tokio-tungstenite,
    # etc.) — both versions coexist in the lock.
    #
    # CRITICAL: the `mqtt` feature is OPT-IN and NOT in `[features].default`
    # (see Cargo.toml line 254 + 290). The default consumer build does NOT
    # link rustls-webpki 0.102.8 at all; only operators that explicitly
    # build with `--features mqtt` are exposed. The general MoA app and
    # the Railway sync-relay path both run on the rustls 0.23 + 0.103.13
    # branch, which is fully patched.
    #
    # We accept the four 0.102.8-only advisories below as the cost of
    # keeping the optional MQTT subscriber working. Removal options
    # tracked under a follow-up issue:
    #   (a) wait for upstream rumqttc to release a 0.103-only resolution,
    #   (b) switch to `rumqttc-v4-next` 0.31 (separate PR — API change),
    #   (c) replace the MQTT subscriber with `paho-mqtt` and drop rumqttc.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102.8 via OPT-IN [features].mqtt -> rumqttc 0.25.1; default build is unaffected. Removal tracked." },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.102.8 via OPT-IN [features].mqtt -> rumqttc 0.25.1; default build is unaffected. Removal tracked." },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.102.8 via OPT-IN [features].mqtt -> rumqttc 0.25.1; default build is unaffected. Removal tracked." },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.102.8 via OPT-IN [features].mqtt -> rumqttc 0.25.1; default build is unaffected. Removal tracked." },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
