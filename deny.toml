# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    # bincode v2.0.1 via probe-rs — project ceased but 1.3.3 considered complete
    "RUSTSEC-2025-0141",
    { id = "RUSTSEC-2024-0384", reason = "Reported to `rust-nostr/nostr` and it's WIP" },
    { id = "RUSTSEC-2024-0388", reason = "derivative via extism → wasmtime transitive dep" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash via extism → wasmtime transitive dep" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix via indicatif — cosmetic dep" },
    # rand — unsound with custom global logger; affects all rand versions transitively;
    # no patched version available at time of triage; tracked for remediation
    { id = "RUSTSEC-2026-0097", reason = "rand re-entrancy unsoundness via custom logger; transitive across multiple versions; no patch available yet" },
    # rustls-pemfile — unmaintained, functionality moved to rustls-pki-types;
    # transitive dep, upstream migration tracked
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained; transitive dep awaiting upstream migration to rustls-pki-types" },
    # rustls-webpki — two versions in tree; direct dep was bumped in #5786 but a
    # second transitive copy remains; all three advisories below affect the old copy
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki CRL matching bug; transitive duplicate copy remains after #5786 bump; awaiting dep tree cleanup" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraints; transitive duplicate copy remains after #5786 bump; awaiting dep tree cleanup" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraints; transitive duplicate copy remains after #5786 bump; awaiting dep tree cleanup" },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
