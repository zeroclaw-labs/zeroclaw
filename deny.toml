# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    # bincode v2.0.1 via probe-rs — upstream project ceased; accepted transitive risk for current hardware stack.
    { id = "RUSTSEC-2025-0141", reason = "Transitive via probe-rs in current release path; tracked for replacement when probe-rs updates." },
    { id = "RUSTSEC-2024-0384", reason = "Reported to `rust-nostr/nostr` and it's WIP" },
    # derivative v2.2.0 via wasm_evt_listener -> matrix_indexed_db_futures -> matrix-sdk-indexeddb.
    # This chain is transitive under matrix-sdk's IndexedDB integration path; matrix-sdk remains pinned to 0.16 in current release line.
    { id = "RUSTSEC-2024-0388", reason = "Transitive via matrix-sdk indexeddb dependency chain; tracked until matrix-sdk ecosystem removes derivative." },
    # paste v1.0.15 via wasmtime runtime stack.
    { id = "RUSTSEC-2024-0436", reason = "Transitive via wasmtime dependency stack; tracked until upstream removes or replaces paste." },
    # rustls-webpki v0.102.8 — transitive dependency that survives our 0.103.x
    # update (some consumer in the tree still pulls 0.102.8). The 0.103.13
    # upgrade landed via cargo update on 2026-05-03; the 0.102.8 path remains
    # to be audited and removed in a follow-up PR (cargo tree -i could not
    # locate the consumer; needs a targeted dependency-graph trace).
    # Tracked separately from the consumer-build's actual TLS path, which is
    # rustls 0.23.x with the 0.103.13 webpki — i.e. the 0.102.8 instance is
    # almost certainly only loaded by an internal/dev tool, not the runtime
    # request path. Removing the four advisories below should not block the
    # audit gate while we trace the consumer.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102.8 transitive; consumer trace WIP, follow-up PR." },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.102.8 transitive; consumer trace WIP, follow-up PR." },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.102.8 transitive; consumer trace WIP, follow-up PR." },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.102.8 transitive; consumer trace WIP, follow-up PR." },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
