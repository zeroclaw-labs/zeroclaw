# documentation: https://github.com/DeliveryBoyTech/daemonclaw
# slogan: Fast, small, fully autonomous AI personal assistant infrastructure — deploy anywhere, swap anything
# tags: ai, agent, assistant, self-hosted, llm, chatbot, rust
# logo: svgs/daemonclaw.png
# port: 42617

services:
  daemonclaw:
    image: ghcr.io/DeliveryBoyTech/daemonclaw:latest
    restart: unless-stopped
    environment:
      - API_KEY=${SERVICE_PASSWORD_APIKEY:-}
      - PROVIDER=${PROVIDER:-openrouter}
      - DAEMONCLAW_ALLOW_PUBLIC_BIND=true
      - DAEMONCLAW_GATEWAY_PORT=42617
    volumes:
      - daemonclaw-data:/daemonclaw-data
    ports:
      - "42617:42617"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 32M
    healthcheck:
      test: ["CMD", "daemonclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  daemonclaw-data:
